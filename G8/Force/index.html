<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 8 Science - Force</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f0f4f8; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { margin: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* BRANDING OVERLAY - AUTOMATIC TRANSITION */
        #branding-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            animation: hideOverlay 0.5s 5.5s forwards; /* CSS Backup to hide automatically */
        }
        #branding-overlay img { width: 250px; height: auto; }

        @keyframes hideOverlay {
            from { opacity: 1; visibility: visible; }
            to { opacity: 0; visibility: hidden; }
        }

        /* MAIN UI */
        .quiz-container {
            width: 90%; max-width: 550px; background: white; padding: 30px;
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center; position: relative;
        }
        .hidden { display: none !important; }

        .stats { display: flex; justify-content: space-between; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        .timer-bar { height: 8px; background: #eee; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        #timer-fill { height: 100%; background: var(--primary); width: 100%; transition: width 1s linear; }

        .q-img { width: 100%; max-height: 180px; object-fit: contain; margin-bottom: 15px; border-radius: 10px; }
        .q-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: #2d3748; }

        .options-grid { display: grid; gap: 12px; }
        .opt-btn {
            padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px;
            background: white; cursor: pointer; transition: 0.2s; font-size: 1rem; text-align: left;
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--primary); background: #f7fafc; }
        .correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        #explanation { margin-top: 15px; padding: 15px; background: #fffaf0; border-radius: 10px; border-left: 4px solid #f6ad55; text-align: left; font-size: 0.9rem; }
        .btn-main { padding: 15px 40px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }

        /* STAR ANIMATION */
        .star { position: absolute; color: #f6e05e; pointer-events: none; animation: starAnim 0.7s forwards; font-size: 24px; }
        @keyframes starAnim { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-50px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="branding-overlay">
        <img src="assets/logo.png" alt="Innovine" onerror="this.style.display='none'">
    </div>

    <div id="intro-screen" class="quiz-container">
        <h1 style="color:var(--primary); margin:0;">Force Mastery</h1>
        <p>Grade 8 | Science</p>
        <p style="color:#4a5568; margin-bottom:30px;">Challenge your understanding of forces!</p>
        <button class="btn-main" onclick="startQuiz()">Start Quiz</button>
    </div>

    <div id="quiz-screen" class="quiz-container hidden">
        <div class="stats">
            <span>Question <span id="q-num">1</span>/10</span>
            <span id="score-val">Score: 0</span>
        </div>
        <div class="timer-bar"><div id="timer-fill"></div></div>
        <div id="question-box">
            <img id="q-image" class="q-img hidden" src="">
            <div id="q-text" class="q-text"></div>
            <div id="options-box" class="options-grid"></div>
        </div>
        <div id="explanation" class="hidden"></div>
    </div>

    <div id="result-screen" class="quiz-container hidden">
        <h2 style="color:var(--primary)">Quiz Results</h2>
        <p id="final-stats" style="font-size:1.6rem; margin:20px 0;"></p>
        <button class="btn-main" onclick="location.reload()">Retry Quiz</button>
    </div>

    <audio id="snd-right" src="assets/correct.mp3"></audio>
    <audio id="snd-wrong" src="assets/wrong.mp3"></audio>
