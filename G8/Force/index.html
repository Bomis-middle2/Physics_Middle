<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Force Master</title>

<style>
:root {
    --primary:#0f172a;
    --accent:#2563eb;
    --success:#059669;
    --error:#dc2626;
}

body{
    margin:0;
    background:#f1f5f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:system-ui;
}

.card{
    width:95%;
    max-width:420px;
    height:92vh;
    background:white;
    border-radius:24px;
    padding:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.hidden{display:none;}

.q-text{
    font-weight:700;
    margin-bottom:10px;
}

.btn{
    padding:15px;
    border:none;
    border-radius:12px;
    margin:5px 0;
    font-weight:700;
    cursor:pointer;
}

.btn-opt{
    background:#f1f5f9;
}

.btn-opt:active{transform:scale(0.95);}

.is-correct{background:green;color:white;}
.is-wrong{background:red;color:white;}

canvas{
    border-radius:16px;
    background:#eef2ff;
}
</style>
</head>

<body>

<div id="intro" class="card">
    <h2>⚡ Force Master</h2>
    <p>Physics Case Study Quiz</p>
    <button class="btn" style="background:#2563eb;color:white;" onclick="initQuiz()">START</button>
</div>

<div id="quiz" class="card hidden">
    <div>
        <div id="score">0 PTS</div>
        <canvas id="diagram" width="320" height="180"></canvas>
        <div id="q" class="q-text"></div>
        <div id="options"></div>
    </div>
</div>

<div id="result" class="card hidden">
    <h2>Done ✅</h2>
    <h1 id="finalScore"></h1>
    <button onclick="location.reload()">Restart</button>
</div>

<script>
const questions = [
{
q:"A potter shapes clay using force. What changes?",
o:["Speed","Stop","Shape change","Direction"],
c:2, type:"none"
},
{
q:"Football kicked in same direction. Result?",
o:["Stop","Reverse","Speed increase","Mass change"],
c:2, type:"motion"
},
{
q:"50N left vs 30N right. Result?",
o:["80 right","20 left","20 right","0"],
c:1, type:"forces"
},
{
q:"Which is non-contact?",
o:["Push","Catch","Magnet","Kick"],
c:2, type:"magnet"
},
{
q:"Astronaut on Moon. Same?",
o:["Weight","Mass","Gravity","Scale"],
c:1, type:"gravity"
},
{
q:"10kg bag (g=10). Weight?",
o:["10","1","100","0"],
c:2, type:"gravity"
},
{
q:"Cricketer pulls hands. Why?",
o:["Increase","Reduce","Stop","Style"],
c:1, type:"collision"
}
];

let i=0,score=0,locked=false;
let canvas,ctx;

function initQuiz(){
    document.getElementById('intro').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');
    render();
}

function setupCanvas(){
    canvas=document.getElementById("diagram");
    ctx=canvas.getContext("2d");
}

function render(){
    if(i>=questions.length)return end();

    setupCanvas();
    locked=false;

    let q=questions[i];
    document.getElementById('q').innerText=q.q;

    draw(q.type);

    let optBox=document.getElementById('options');
    optBox.innerHTML="";

    q.o.forEach((text,index)=>{
        let b=document.createElement("button");
        b.className="btn btn-opt";
        b.innerText=text;
        b.onclick=()=>check(index,b);
        optBox.appendChild(b);
    });
}

function check(idx,btn){
    if(locked)return;
    locked=true;

    if(idx===questions[i].c){
        btn.classList.add("is-correct");
        score+=10;
    } else {
        btn.classList.add("is-wrong");
    }

    document.getElementById('score').innerText=score+" PTS";

    setTimeout(()=>{
        i++;
        render();
    },1000);
}

function draw(type){
    ctx.clearRect(0,0,320,180);

    if(type==="gravity"){
        gravityAnim();
    }
    else if(type==="collision"){
        collisionAnim();
    }
    else if(type==="magnet"){
        magnetAnim();
    }
}

function gravityAnim(){
    let y=10,v=0;

    let anim=setInterval(()=>{
        ctx.clearRect(0,0,320,180);

        v+=0.5;
        y+=v;

        ctx.fillRect(0,160,320,20);

        ctx.beginPath();
        ctx.arc(150,y,12,0,6.28);
        ctx.fill();

        if(y>150){
            y=150;
            v*=-0.6;
        }

        if(Math.abs(v)<0.5){
            clearInterval(anim);
        }
    },16);
}
