<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G8 Physics | Force Mastery</title>
    <style>
        :root { 
            --p: #f8fafc; --text: #1e293b; --acc: #3b82f6; 
            --s: #10b981; --e: #ef4444; --warn: #f59e0b; 
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: var(--p); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        #blueprint {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 1;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: moveGrid 30s linear infinite;
        }

        .symbol {
            position: fixed; color: rgba(59, 130, 246, 0.12); font-weight: 800; 
            font-family: serif; pointer-events: none; z-index: 2; user-select: none;
        }

        @keyframes moveGrid { from { transform: translate(0, 0); } to { transform: translate(60px, 60px); } }
        @keyframes floatSymbol { from { transform: translate(0, 0) rotate(0deg); } to { transform: translate(var(--mx), var(--my)) rotate(360deg); } }

        .card {
            width: 92%; max-width: 600px; background: var(--glass); 
            padding: 2rem; border-radius: 24px; border: 1.5px solid rgba(59, 130, 246, 0.2);
            backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center; position: relative; z-index: 100;
            display: none; opacity: 0; transform: translateY(20px);
            transition: all 0.4s ease;
        }

        #logo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s;
        }

        .btn-opt {
            display: block; width: 100%; padding: 12px 18px; margin: 8px 0;
            background: white; border: 2px solid #e2e8f0;
            border-radius: 12px; color: var(--text); cursor: pointer; text-align: left;
            transition: 0.2s; font-weight: 500; font-size: 0.95rem;
        }
        .btn-opt:hover:not(:disabled) { border-color: var(--acc); background: #f0f9ff; transform: translateX(5px); }
        .is-correct { background: var(--s) !important; color: white; border-color: var(--s); }
        .is-wrong { background: var(--e) !important; color: white; border-color: var(--e); }

        .btn-main {
            padding: 16px 40px; background: var(--acc); color: white; border: none;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 20px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        #timer-track { height: 6px; background: #e2e8f0; margin: 15px 0; border-radius: 10px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--acc); width: 100%; transition: width 1s linear; }

        #feedback { margin-top: 15px; padding: 12px; background: #fffbeb; border-radius: 10px; border-left: 5px solid var(--warn); text-align: left; font-size: 0.85rem; color: #92400e; }

        @media (max-width: 600px) { .card { padding: 1.2rem; } h3 { font-size: 1rem; } .btn-opt { font-size: 0.85rem; padding: 10px; } }
    </style>
</head>
<body>

    <div id="blueprint"></div>
    <div id="symbol-container"></div>

    <div id="logo-overlay">
        <img src="assets/logo.png" alt="Innovine" style="width: 200px;" onerror="this.style.display='none'">
    </div>

    <div id="scr-intro" class="card">
        <h1 style="color:var(--acc); margin-bottom: 5px;">CBSE PHYSICS</h1>
        <p style="font-weight: 600; color: #64748b;">Force & Pressure: Final Logic Pool</p>
        <div style="text-align: left; font-size: 0.85rem; background: #f1f5f9; padding: 15px; border-radius: 12px; margin: 15px 0;">
            • 10 Randomized Core Questions<br>
            • 1 Ultimate Logic Challenge (Set of 5)<br>
            • 2 Attempts Per Question
        </div>
        <button class="btn-main" onclick="startQuiz()">START MISSION</button>
    </div>

    <div id="scr-quiz" class="card">
        <div style="display:flex; justify-content: space-between; font-size: 0.75rem; color: var(--acc); font-weight: 800;">
            <span id="q-num">STEP 1/11</span>
            <span id="score-now">PTS: 0</span>
        </div>
        <div id="timer-track"><div id="timer-bar"></div></div>
        <h3 id="q-txt" style="text-align:left; line-height: 1.4; margin-bottom: 15px;"></h3>
        <div id="options"></div>
        <div id="feedback" style="display:none;"></div>
    </div>

    <div id="scr-result" class="card">
        <h2 style="margin: 0;">MISSION REPORT</h2>
        <div id="res-score" style="font-size:3.5rem; font-weight:900; color:var(--acc); margin: 10px 0;"></div>
        <p id="res-rank" style="font-weight: 800; color: var(--warn); margin: 5px 0;"></p>
        <p id="res-desc" style="margin-bottom: 20px; color: #64748b; font-size: 0.9rem;"></p>
        <button class="btn-main" onclick="location.reload()">RE-INITIALIZE</button>
    </div>

    <script>
        // SYMBOLS
        const syms = ['F=ma', 'v=d/t', 'G', 'ΣF', 'm', 'a', 'W=mg', 'N', 'kg', 'Δ'];
        const container = document.getElementById('symbol-container');
        for(let i=0; i<20; i++) {
            const div = document.createElement('div');
            div.className = 'symbol';
            div.innerText = syms[Math.floor(Math.random()*syms.length)];
            div.style.left = Math.random()*100 + 'vw';
            div.style.top = Math.random()*100 + 'vh';
            div.style.setProperty('--mx', (Math.random()*300 - 150) + 'px');
            div.style.setProperty('--my', (Math.random()*300 - 150) + 'px');
            div.style.animation = `floatSymbol ${Math.random()*15 + 10}s linear infinite alternate`;
            container.appendChild(div);
        }

        setTimeout(() => {
            const overlay = document.getElementById('logo-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                const intro = document.getElementById('scr-intro');
                intro.style.display = 'block';
                setTimeout(() => { intro.style.opacity = '1'; intro.style.transform = 'translateY(0)'; }, 50);
            }, 800);
        }, 5000);

        // THE 30 CORE QUESTIONS
        const corePool = [
            { q: "Car A is pushed with 5N Right. Car B is pushed with 10N Right and 5N Left. Which statement is correct?", o: ["Car A moves faster", "Car B moves slower", "Both move with same resultant force (5N Right)", "Car B stays stationary"], c: 2, e: "Net force on B = 10 - 5 = 5 N. Both match." },
            { q: "A block is acted upon by: F1=10N (North), F2=10N (South), and F3=5N (West). Direction of motion?", o: ["North", "South", "West", "No move"], c: 2, e: "Vertical forces cancel out, leaving 5N West." },
            { q: "Upward thrust on a rocket is exactly equal to gravity and air resistance combined. The rocket will:", o: ["Fall back", "Stop mid-air", "Continue moving upward at constant speed", "Accelerate faster"], c: 2, e: "Zero net force means constant velocity (Newton's 1st Law)." },
            { q: "A crate needs 50N to slide. Two people pull it in the same direction with 20N and 25N. Will it move?", o: ["Yes (45N)", "No (Resultant 45N < 50N)", "Yes (Any force)", "No (Forces must be equal)"], c: 1, e: "Resultant must exceed required force." },
            { q: "Error check: 'Force can only move an object at rest.' Why is this wrong?", o: ["Force only stops objects", "Force only changes shape", "Force can change speed/direction of objects already in motion", "Force ignores stationary objects"], c: 2, e: "Force affects objects in any state of motion." },
            { q: "Skydiver experiences downward gravity and upward air drag. Classify these forces:", o: ["Both contact", "Both non-contact", "Gravity non-contact; Air drag contact", "Gravity contact; Air drag non-contact"], c: 2, e: "Gravity acts at a distance; drag needs contact with air particles." },
            { q: "Why is 'Magnetic Force' a non-contact force?", o: ["Magnets are metal", "Attracts/repels without physical touch", "Vacuum only", "Stronger than friction"], c: 1, e: "Magnetic fields exert force through space." },
            { q: "Which is NOT a contact force?", o: ["Muscular force", "Frictional force", "Electrostatic force", "Tension in rope"], c: 2, e: "Electrostatic force is non-contact." },
            { q: "Which contact force prevents us from slipping while walking?", o: ["Gravitational", "Muscular", "Frictional", "Electrostatic"], c: 2, e: "Friction provides ground grip." },
            { q: "Rubbed plastic scale held near neutral copper wire shows no attraction. Why?", o: ["Copper not magnetic", "Metals allow charge flow away", "Silk removes force", "Not rubbed hard enough"], c: 1, e: "Conductors dissipate static charge immediately." },
            { q: "An object has a mass of 12kg on Earth. What is its weight? (g=10)", o: ["1.2 N", "12 N", "120 N", "120 kg"], c: 2, e: "Weight = 12 x 10 = 120N." },
            { q: "Which instrument will show a different reading on the Moon vs Earth?", o: ["Beam balance", "Spring balance", "Ruler", "Stopwatch"], c: 1, e: "Spring balance measures gravity-dependent weight." },
            { q: "If you go to a planet where gravity is double Earth's:", o: ["Mass doubles, Weight same", "Mass same, Weight same", "Mass same, Weight doubles", "Both double"], c: 2, e: "Mass stays constant; Weight is proportional to gravity." },
            { q: "A stone hanging from a spring balance is submerged in water. The reading will:", o: ["Decrease (Buoyancy)", "Increase", "Stay same", "Become zero"], c: 0, e: "Buoyant force acts upward, opposing gravity." },
            { q: "Why is Weight measured in 'Newtons'?", o: ["It is speed", "It is a force exerted by gravity", "KG is only for liquids", "Newton discovered Moon"], c: 1, e: "Weight is a force, not just mass." },
            { q: "Baker pressing down on a ball of dough. Primary effect of force?", o: ["Change speed", "Change direction", "Change shape and size", "Change mass"], c: 2, e: "Force deforms the dough." },
            { q: "Goalkeeper catches a football and brings it to rest. Effect?", o: ["Changing state of motion", "Changing direction", "Changing mass", "Non-contact force"], c: 0, e: "Motion to rest transition." },
            { q: "Compass needle deflects near a magnet. Shows force can:", o: ["Change shape", "Change direction of motion", "Increase weight", "Stop vibration"], c: 1, e: "Force changes the needle's alignment." },
            { q: "Apply force to heavy wall, wall doesn't move. Why?", o: ["No force applied", "Wall no mass", "Resultant didn't overcome inertia/friction", "Only works on small objects"], c: 2, e: "Unbalanced force was insufficient." },
            { q: "Same force on tennis ball and bowling ball. Greater change in speed?", o: ["Tennis ball (less mass)", "Bowling ball (larger)", "Both same", "Neither move"], c: 0, e: "Less mass = more acceleration (F=ma)." },
            { q: "Team A pulls 1500N. Team B pulls 1550N. B player trips (-100N). Rope goes:", o: ["To B (50N)", "Stationary", "To A (50N)", "To A (100N)"], c: 2, e: "Team B becomes 1450N. Net = 50N to Team A." },
            { q: "Ball rolls constant speed. Player kicks at exactly 90°. Effect?", o: ["Faster", "Stops", "Direction changes, speed same initially", "Moves backward"], c: 2, e: "Perpendicular force alters path direction." },
            { q: "Astronaut mass 60kg on Earth. Mass on Moon (1/6th gravity)?", o: ["10 kg", "360 kg", "60 kg", "0 kg"], c: 2, e: "Mass remains constant everywhere." },
            { q: "Two identical spring balances in series. 10N hung at bottom. Top reading?", o: ["5 N", "10 N", "20 N", "0 N"], c: 1, e: "Force is transmitted equally through the line." },
            { q: "Paper bits 'jump' to a rubbed scale. Demonstrates:", o: ["Magnetic force", "Electrostatic acts at a distance", "Muscular transfer", "Friction pulling"], c: 1, e: "Static charge is a non-contact force." },
            { q: "Student: 'Zero resultant force means object cannot move.' Incorrect because:", o: ["Always move", "Can move at constant speed", "Causes speed up", "Net force is never zero"], c: 1, e: "Balanced forces allow for uniform velocity." },
            { q: "Stop a trolley moving toward you. Apply force in:", o: ["90° angle", "Same direction", "Opposite direction", "Downward"], c: 2, e: "Opposing motion causes deceleration." },
            { q: "Which scenario describes 'Balanced Forces'?", o: ["Car speeding up", "Book lying still on table", "Ball falling", "Plane takeoff"], c: 1, e: "Static rest implies all forces are equal and opposite." },
            { q: "Why apply force to dough?", o: ["Change motion", "Increase mass", "Change shape/size", "Increase gravity"], c: 2, e: "Forces cause physical deformation." },
            { q: "Weight 120N on Earth (g=10). Weight on Planet X (g=5)?", o: ["60 N", "120 N", "24 N", "240 N"], c: 0, e: "Mass is 12kg. 12 x 5 = 60N." }
        ];

        // THE 5 FINAL CHALLENGES
        const finalChallenges = [
            { 
                q: "LOGIC CHALLENGE 1: Balanced tug-of-war. Both teams suddenly pull twice as hard. Result?", 
                o: ["Rope moves to side with larger area", "Resultant stays Zero, Tension increases", "Resultant doubles", "Rope moves to A"], 
                c: 1, 
                e: "Force increase is equal on both sides; they cancel out, but the rope is under higher stress." 
            },
            { 
                q: "LOGIC CHALLENGE 2: Astronaut in ISS orbits Earth. Scale shows 0N. Gravity is actually 90% there. Why?", 
                o: ["Zero gravity in space", "Moving too fast for weight", "Astronaut & ISS are in Free Fall", "Vacuum removes weight"], 
                c: 2, 
                e: "Both the scale and person fall together; there is no support force to create a reading." 
            },
            { 
                q: "LOGIC CHALLENGE 3: Brick pulled on broad side vs narrow side (same speed). Spring balance reading?", 
                o: ["Higher on narrow side (Pressure)", "Higher on broad side", "The reading will be the same", "Depends on table length"], 
                c: 2, 
                e: "Friction depends on surface nature and weight, not the area of contact." 
            },
            { 
                q: "LOGIC CHALLENGE 4: Car traveling perfectly constant 100km/h in a straight line. Resultant force?", 
                o: ["100 N", "Equal to engine's forward force", "Resultant is Zero", "Equal to total friction"], 
                c: 2, 
                e: "Constant speed in a straight line means forward and backward forces are perfectly balanced." 
            },
            {
                q: "LOGIC CHALLENGE 5: A balloon is squeezed. The air inside pushes back. What type of force is the internal air pressure?",
                o: ["Non-contact Force", "Contact Force", "Gravitational Force", "Magnetic Force"],
                c: 1,
                e: "Air particles must collide with (contact) the inner surface of the balloon to exert pressure."
            }
        ];

        let session = [], current = 0, score = 0, timer, time = 45, lock = false, tries = 0;
        let finalStatus = 0; // 0: missed, 1: got it

        function startQuiz() {
            let shuffledCore = [...corePool].sort(() => 0.5 - Math.random());
            session = shuffledCore.slice(0, 10);
            
            let shuffledFinal = [...finalChallenges].sort(() => 0.5 - Math.random());
            session.push(shuffledFinal[0]);

            document.getElementById('scr-intro').style.display = 'none';
            document.getElementById('scr-quiz').style.display = 'block';
            setTimeout(() => { document.getElementById('scr-quiz').style.opacity = '1'; document.getElementById('scr-quiz').style.transform = 'translateY(0)'; }, 50);
            render();
        }

        function render() {
            if(current >= session.length) return end();
            lock = false; tries = 0; time = 45;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('q-num').innerText = (current === 10) ? "ULTIMATE CHALLENGE" : `STEP ${current+1}/11`;
            document.getElementById('q-txt').innerText = session[current].q;
            const box = document.getElementById('options');
            box.innerHTML = '';
            session[current].o.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = 'btn-opt'; b.innerText = txt;
                b.onclick = () => check(i, b);
                box.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            const bar = document.getElementById('timer-bar');
            timer = setInterval(() => {
                time--;
                bar.style.width = (time/45*100) + '%';
                if(time <= 0) { clearInterval(timer); reveal(); }
            }, 1000);
        }

        function check(idx, btn) {
            if(lock) return;
            if(idx === session[current].c) {
                lock = true; clearInterval(timer);
                btn.classList.add('is-correct');
                score += (tries === 0) ? 10 : 5;
                if(current === 10) finalStatus = 1;
                document.getElementById('score-now').innerText = "PTS: " + score;
                setTimeout(() => { current++; render(); }, 1200);
            } else {
                tries++;
                btn.classList.add('is-wrong'); btn.disabled = true;
                if(tries === 1) {
                    const fb = document.getElementById('feedback');
                    fb.innerText = "HINT: Re-examine the interaction of forces in this state.";
                    fb.style.display = 'block';
                } else {
                    lock = true; clearInterval(timer); reveal();
                }
            }
        }

        function reveal() {
            const btns = document.querySelectorAll('.btn-opt');
            btns[session[current].c].classList.add('is-correct');
            const fb = document.getElementById('feedback');
            fb.innerHTML = `<b>Logic:</b> ${session[current].o[session[current].c]}<br>${session[current].e}`;
            fb.style.display = 'block';
            setTimeout(() => { current++; render(); }, 5000);
        }

        function end() {
            document.getElementById('scr-quiz').style.display = 'none';
            document.getElementById('scr-result').style.display = 'block';
            setTimeout(() => { document.getElementById('scr-result').style.opacity = '1'; document.getElementById('scr-result').style.transform = 'translateY(0)'; }, 50);
            
            document.getElementById('res-score').innerText = score + "/110";
            
            const rank = document.getElementById('res-rank');
            const desc = document.getElementById('res-desc');
            
            if(score === 110) {
                rank.innerText = "PHYSICS MASTER";
                desc.innerText = "Unmatched conceptual depth! You are a master of Grade 8 Physics.";
            } else if(finalStatus === 1) {
                rank.innerText = "FORCE EXPERT";
                desc.innerText = "Excellent handling of complex scenarios. You crushed the Final Challenge!";
            } else if(score >= 60) {
                rank.innerText = "PHYSICS PRACTITIONER";
                desc.innerText = "You have a solid handle on the basics, but the complex logic needs review.";
            } else {
                rank.innerText = "FORCE APPRENTICE";
                desc.innerText = "Review the 'Resultant Force' principles and try the mission again.";
            }
        }
    </script>
</body>
</html>
