<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 8 | Force Mastery</title>
    <style>
        :root {
            --p: #0f172a; /* Slate Dark */
            --accent: #3b82f6; /* Electric Blue */
            --success: #10b981;
            --error: #ef4444;
            --bg: #f1f5f9;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            margin: 0; background: var(--bg); color: var(--p);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* SCIENTIFIC THEME BACKGROUND */
        #theme-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            background-color: #e2e8f0;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px; /* Grid look */
        }

        .physics-icon {
            position: absolute; color: rgba(59, 130, 246, 0.15);
            font-size: 40px; animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* BRANDING OVERLAY */
        #logo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s ease;
        }
        #logo-overlay img { width: 260px; height: auto; }

        /* INTERACTIVE CARD */
        .card {
            width: 94%; max-width: 550px; background: rgba(255, 255, 255, 0.95);
            padding: 35px; border-radius: 20px; border: 1px solid #cbd5e1;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center; position: relative; z-index: 100;
        }
        .hidden { display: none !important; }

        /* UI ELEMENTS */
        .stats { display: flex; justify-content: space-between; font-weight: 800; color: var(--accent); margin-bottom: 10px; font-size: 0.9rem; letter-spacing: 1px; }
        .timer-track { height: 6px; background: #e2e8f0; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--accent); width: 100%; transition: width 1s linear; }

        .q-img { width: 100%; max-height: 180px; object-fit: contain; margin-bottom: 20px; border-radius: 10px; background: #f8fafc; padding: 10px; }
        .q-text { font-size: 1.2rem; font-weight: 600; text-align: left; line-height: 1.5; margin-bottom: 25px; color: #1e293b; }

        .grid { display: grid; gap: 12px; }
        .btn-opt {
            padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px;
            background: white; cursor: pointer; transition: 0.2s;
            font-size: 1rem; text-align: left; font-weight: 500;
        }
        .btn-opt:hover:not(:disabled) { border-color: var(--accent); background: #f0f7ff; }
        .is-correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .is-wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        .btn-main {
            padding: 18px 50px; background: var(--accent); color: white; border: none;
            border-radius: 50px; font-size: 1.2rem; cursor: pointer; font-weight: 800;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.05); background: #2563eb; }

        #feedback { margin-top: 20px; padding: 18px; background: #fffbeb; border-radius: 12px; border-left: 5px solid #f59e0b; text-align: left; font-size: 0.95rem; line-height: 1.5; }

        /* CORRECT ANIMATION */
        .sparkle { position: absolute; pointer-events: none; animation: fly 0.8s forwards; font-size: 24px; color: #facc15; z-index: 200; }
        @keyframes fly { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.6) translateY(-100px) rotate(45deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="theme-bg"></div>

    <div id="logo-overlay">
        <img src="assets/logo.png" alt="Innovine" onerror="this.style.display='none'">
    </div>

    <div id="scr-intro" class="card">
        <h1 style="color:var(--accent); margin-top:0;">FORCE</h1>
        <p>Advanced Competency Challenge | Grade 8</p>
        <p style="color:#64748b; margin-bottom:30px;">Analyze scenarios, calculate net forces, and master non-contact interactions.</p>
        <button class="btn-main" onclick="start()">Launch Challenge</button>
    </div>

    <div id="scr-quiz" class="card hidden">
        <div class="stats">
            <span>QUESTION <span id="q-idx">1</span>/10</span>
            <span id="score-val">SCORE: 0</span>
        </div>
        <div class="timer-track"><div id="timer-bar"></div></div>
        <div id="q-container">
            <img id="q-image" class="q-img hidden" src="">
            <div id="q-txt" class="q-text"></div>
            <div id="options" class="grid"></div>
        </div>
        <div id="feedback" class="hidden"></div>
    </div>

    <div id="scr-result" class="card hidden">
        <h2 id="res-title">Mission Report</h2>
        <p id="res-score" style="font-size:2.5rem; font-weight:900; margin:15px 0; color:var(--accent);"></p>
        <p id="res-desc" style="color:#475569; line-height:1.5; margin-bottom:30px;"></p>
        <button class="btn-main" onclick="location.reload()">Re-Run Mission</button>
    </div>

    <audio id="aud-right" src="assets/correct.mp3"></audio>
    <audio id="aud-wrong" src="assets/wrong.mp3"></audio>

    <script>
        const questions = [
            { q: "Two teams tug-of-war. Team A: 1200 N. Team B: 1250 N. A player from B slips, reducing force by 80 N. Which way will the rope move?", o: ["Towards Team B with 50 N", "Towards Team B with 30 N", "Towards Team A with 30 N", "It will remain stationary"], c: 2, e: "New Team B force is 1170N (1250-80). Net Force = 1200 - 1170 = 30 N towards Team A." },
            { q: "A ball rolls on a frictionless surface. A force is applied exactly perpendicular (90°) to its motion. What is the effect?", o: ["The ball will speed up", "The ball will slow down", "Speed stays same, direction changes", "The ball immediately stops"], c: 2, e: "Forces perpendicular to motion act as centripetal forces, changing direction but not speed magnitude." },
            { q: "Two identical spring balances are connected in a line (series). A 5 kg weight is hung from the bottom. What does the top balance read?", o: ["2.5 kg", "5 kg", "0 kg", "10 kg"], c: 1, i: "assets/q8.png", e: "In series, tension is uniform. Both balances support the entire load." },
            { q: "An object weighs 600 N on Earth (g=10). On a planet with 1/3 Earth's gravity, what are its Mass and Weight?", o: ["Mass = 20 kg, Weight = 200 N", "Mass = 60 kg, Weight = 200 N", "Mass = 60 kg, Weight = 600 N", "Mass = 20 kg, Weight = 600 N"], c: 1, e: "Mass (600/10=60kg) is constant. New Weight = 600 × 1/3 = 200 N." },
            { q: "Rubbing a comb against hair and bending a water stream demonstrates which force?", o: ["Magnetic", "Gravitational", "Electrostatic", "Air Pressure"], c: 2, e: "Friction creates static charge. This non-contact force attracts water molecules." },
            { q: "A student says: 'If net force is Zero, the object MUST be at rest.' Why is this incomplete?", o: ["Zero force means disappearing", "Object could be in Uniform Motion", "Zero force means acceleration", "Friction is always present"], c: 1, e: "Zero net force means no *change* in motion. An object could already be moving at constant speed." },
            { q: "Holding a heavy box still at chest height makes you tired. Why?", o: ["You are doing work", "Muscles counteract gravity", "Mass increases", "Muscular force is non-contact"], c: 1, e: "Gravity is pulling down. Your muscles must apply a constant equal upward force to maintain equilibrium." },
            { q: "A skydiver falls before opening the parachute. Which two forces are primary?", o: ["Muscular and Magnetic", "Gravity and Air Friction", "Electrostatic and Gravity", "Magnetic and Air Friction"], c: 1, e: "Gravity acts from a distance; air resistance (drag) is a contact force with air particles." },
            { q: "A 2kg car is pulled left with 10N and right with 10N. A third force of 2N is added to the right. What is the resultant?", o: ["22 N to the right", "0 N", "2 N to the right", "2 N to the left"], c: 2, e: "Initial forces cancel out (10-10=0). The new 2N force becomes the net unbalanced force." },
            { q: "A metal sphere dents a clay block. Which effect of force is NOT present here?", o: ["Change in speed", "Change in shape", "Change in mass", "Contact force"], c: 2, e: "Force can change speed, direction, and shape, but never the amount of matter (mass)." }
        ];

        let idx = 0, score = 0, clock, time = 45, tries = 0, lock = false;

        // Theme Background Icons
        const icons = ['(F=ma)', '➔', '🧲', '⚖️', '⚙️', '⟴'];
        window.onload = () => {
            const bg = document.getElementById('theme-bg');
            for(let i=0; i<15; i++) {
                const s = document.createElement('div');
                s.className = 'physics-icon';
                s.innerText = icons[i % icons.length];
                s.style.left = Math.random() * 100 + 'vw';
                s.style.animationDelay = Math.random() * 15 + 's';
                bg.appendChild(s);
            }
            // Auto-hide logo after 5s
            setTimeout(() => {
                const overlay = document.getElementById('logo-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 800);
            }, 5000);
        };

        function start() {
            document.getElementById('scr-intro').classList.add('hidden');
            document.getElementById('scr-quiz').classList.remove('hidden');
            load();
        }

        function load() {
            if(idx >= questions.length) return results();
            lock = false; tries = 0; time = 45;
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('q-idx').innerText = idx + 1;
            
            const q = questions[idx];
            document.getElementById('q-txt').innerText = q.q;
            const img = document.getElementById('q-image');
            if(q.i) { img.src = q.i; img.classList.remove('hidden'); }
            else { img.classList.add('hidden'); }

            const box = document.getElementById('options');
            box.innerHTML = '';
            q.o.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = 'btn-opt'; b.innerText = txt;
                b.onclick = () => validate(i, b);
                box.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(clock);
            const bar = document.getElementById('timer-bar');
            clock = setInterval(() => {
                time--;
                bar.style.width = (time/45*100) + '%';
                if(time <= 0) { clearInterval(clock); reveal(); }
            }, 1000);
        }

        function validate(i, btn) {
            if(lock) return;
            const correct = questions[idx].c;

            if(i === correct) {
                lock = true; clearInterval(clock);
                btn.classList.add('is-correct');
                score += (tries === 0) ? 10 : 5;
                document.getElementById('score-val').innerText = "SCORE: " + score;
                
                fx(btn); // Sparkles
                play('aud-right', () => {
                    setTimeout(() => { idx++; load(); }, 500);
                });
            } else {
                tries++;
                btn.classList.add('is-wrong'); btn.disabled = true;
                
                play('aud-wrong', () => {
                    if(tries === 1) {
                        const fb = document.getElementById('feedback');
                        fb.innerText = "HINT: Re-examine the net force calculation or the specific type of force involved.";
                        fb.classList.remove('hidden');
                        // Red flash flash
                        document.body.style.boxShadow = "inset 0 0 50px rgba(239, 68, 68, 0.4)";
                        setTimeout(() => document.body.style.boxShadow = "none", 400);
                    } else {
                        lock = true; clearInterval(clock); reveal();
                    }
                });
            }
        }

        function reveal() {
            const btns = document.querySelectorAll('.btn-opt');
            btns[questions[idx].c].classList.add('is-correct');
            const fb = document.getElementById('feedback');
            fb.innerHTML = `<strong>Correct Answer: ${questions[idx].o[questions[idx].c]}</strong><br>${questions[idx].e}`;
            fb.classList.remove('hidden');
            setTimeout(() => { idx++; load(); }, 4500);
        }

        /** Play Sound and execute callback when done **/
        function play(id, callback) {
            const aud = document.getElementById(id);
            if(aud) {
                aud.currentTime = 0;
                aud.onended = callback; 
                aud.play().catch(() => { 
                    // Fallback if audio is blocked or fails
                    setTimeout(callback, 1000); 
                });
            } else {
                callback();
            }
        }

        function fx(el) {
            const r = el.getBoundingClientRect();
            for(let i=0; i<12; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle'; s.innerHTML = '★';
                s.style.left = (r.left + Math.random()*r.width) + 'px';
                s.style.top = r.top + 'px';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }
        }

        function results() {
            document.getElementById('scr-quiz').classList.add('hidden');
            document.getElementById('scr-result').classList.remove('hidden');
            const p = (score / 100) * 100;
            document.getElementById('res-score').innerText = score + "/100";
            
            let t, d, color;
            if(p >= 75) { 
                t = "Force Mastery Achieved!"; 
                d = "You have a professional grasp of mechanics and resultant forces. Well done!";
                color = "#10b981";
            } else if(p >= 40) { 
                t = "Physics Apprentice"; 
                d = "Good effort! Review uniform motion and series-connected weight readings to improve your rank.";
                color = "#f59e0b";
            } else { 
                t = "Inertia Detected"; 
                d = "Let's apply some more force to your studies. Re-read the chapter and try again.";
                color = "#ef4444";
            }
            
            document.getElementById('res-title').innerText = t;
            document.getElementById('res-title').style.color = color;
            document.getElementById('res-desc').innerText = d;
        }
    </script>
</body>
</html>
