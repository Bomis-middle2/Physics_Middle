<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Innovine | Physics Force Mastery</title>
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --success: #059669;
            --error: #dc2626; --bg: #f8fafc;
        }

        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--primary); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; width: 100vw; overflow: hidden;
            touch-action: manipulation;
        }

        #logo-overlay {
            position: fixed; inset: 0;
            background: #ffffff; display: flex; justify-content: center; align-items: center;
            z-index: 10000; opacity: 1; transition: opacity 0.8s ease;
        }
        #logo-overlay img { width: 180px; height: auto; }

        #blueprint-bg {
            position: fixed; inset: 0; z-index: 1;
            background-color: #f1f5f9;
            background-image: linear-gradient(#e2e8f0 1.5px, transparent 1.5px), linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px; pointer-events: none;
        }

        .card {
            width: 95%; max-width: 500px; background: white;
            padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center; position: relative; z-index: 100;
        }

        .hidden { display: none !important; }

        /* Adjusted for detailed questions */
        .q-text { 
            font-size: 0.95rem; 
            font-weight: 700; 
            text-align: left; 
            line-height: 1.5; 
            margin-bottom: 20px; 
            color: #1e293b;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .options-grid { display: grid; gap: 8px; }
        
        .btn-opt {
            padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px;
            background: white; cursor: pointer; font-size: 0.85rem; 
            text-align: left; font-weight: 600; color: #475569;
            transition: 0.2s; -webkit-tap-highlight-color: transparent;
        }
        
        .is-correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .is-wrong { background: var(--error) !important; color: white !important; border-color: var(--error) !important; opacity: 0.7; }

        .btn-prime {
            padding: 16px 40px; background: var(--accent); color: white; border: none;
            border-radius: 14px; font-size: 1rem; cursor: pointer; font-weight: 800;
        }

        .timer-track { height: 4px; background: #f1f5f9; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--accent); width: 100%; transition: width 1s linear; }

        #feedback-box { margin-top: 15px; padding: 12px; background: #fffbeb; border-radius: 10px; border-left: 4px solid #f59e0b; text-align: left; font-size: 0.85rem; color: #92400e; }
    </style>
</head>
<body>

    <div id="blueprint-bg"></div>

    <div id="logo-overlay"><img src="assets/logo.png" alt="Innovine"></div>

    <div id="scr-intro" class="card hidden">
        <h2 style="color:var(--accent); margin:0 0 10px 0;">FORCE MASTER</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 20px;">Grade 8 Physics CBQ</p>
        <div style="text-align: left; background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 0.85rem; color: #475569; line-height: 1.5;">
            • Detailed Case-Based Scenarios<br>
            • 2 Tries per question!<br>
            • 10 Core + 1 Final Challenge<br>
            • Full points for 1st try (10 pts)
        </div>
        <button class="btn-prime" onclick="initQuiz()">START MISSION</button>
    </div>

    <div id="scr-quiz" class="card hidden">
        <div style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:800; color:var(--accent); margin-bottom:10px;">
            <span id="q-num">TASK 01/11</span>
            <span id="score">PTS: 0</span>
        </div>
        <div class="timer-track"><div id="timer-bar"></div></div>
        <div id="q-txt" class="q-text"></div>
        <div id="options-box" class="options-grid"></div>
        <div id="feedback-box" class="hidden"></div>
    </div>

    <div id="scr-result" class="card hidden">
        <h2 id="res-title">Mission Complete</h2>
        <p id="res-score" style="font-size:3rem; font-weight:900; margin:10px 0; color:var(--accent);"></p>
        <p id="res-desc" style="color:#64748b; font-size:0.9rem; margin-bottom:20px;"></p>
        <button class="btn-prime" onclick="location.reload()">RESTART</button>
    </div>

    <script>
        const corePool = [
            { 
                q: "CASE STUDY: An industrial hydraulic press is used to flatten scrap metal into thin, wide sheets for recycling. A technician observes that while the metal's area increases, its total mass remains identical. Which specific effect of force is the press utilizing?", 
                o: ["Increasing the object's speed", "Changing the shape and size", "Bringing a moving object to rest", "Changing the direction of motion"], 
                c: 1, 
                e: "The hydraulic press applies force to deform the material, altering its physical dimensions without adding or removing matter." 
            },
            { 
                q: "CASE STUDY: A 500g toy car is traveling East at 2 m/s. A child pushes the car from behind, applying a constant force in the same Easterly direction for several seconds. Based on the relationship between force and motion, what happens?", 
                o: ["The car's speed increases", "The car comes to a sudden stop", "The car's mass begins to increase", "The car turns 180 degrees West"], 
                c: 0, 
                e: "When an external force is applied in the direction of an object's current motion, it causes positive acceleration (increase in speed)." 
            },
            { 
                q: "CASE STUDY: A heavy wooden crate is placed on a rough floor. Person X pushes it with 50N of force toward the Left. Simultaneously, Person Y pushes it with 30N of force toward the Right. Calculate the Net Force and direction.", 
                o: ["80N to the Right", "20N to the Left", "20N to the Right", "0N (Balanced)"], 
                c: 1, 
                e: "Subtract opposing forces: 50N (Left) - 30N (Right) = 20N. The crate moves toward the stronger force." 
            },
            { 
                q: "CASE STUDY: During a lab experiment, a student rubs a glass rod with silk and brings it near small bits of paper. The paper bits are suddenly lifted toward the rod without any physical touching. Classify this interaction.", 
                o: ["Muscular (Contact) Force", "Frictional (Contact) Force", "Electrostatic (Non-contact) Force", "Mechanical (Contact) Force"], 
                c: 2, 
                e: "Electrostatic forces are field forces that act over a distance without the need for physical contact between objects." 
            },
            { 
                q: "CASE STUDY: An astronaut travels to a distant moon where the gravitational pull is exactly 1/6th of Earth's gravity. If she takes a 12kg toolkit with her, which property of the toolkit remains totally unchanged?", 
                o: ["The toolkit's Weight", "The toolkit's Mass", "The scale reading in Newtons", "The gravitational pull on it"], 
                c: 1, 
                e: "Mass is an intrinsic property representing the amount of matter in an object; it does not change regardless of gravity." 
            },
            { 
                q: "CASE STUDY: A logistics drone is carrying a package with a mass of 10kg. To calculate the lift force required to hover, engineers use the formula W = m × g (where g = 10 m/s²). What is the package's Weight in Newtons?", 
                o: ["10 N", "100 N", "1 N", "1000 N"], 
                c: 1, 
                e: "Weight is the force of gravity on a mass. Here, 10kg multiplied by 10 m/s² equals 100 Newtons." 
            },
            { 
                q: "CASE STUDY: In a professional cricket match, a fielder catches a high-speed ball by pulling his hands backward during the catch. Why is this technique used in terms of physics?", 
                o: ["To increase the ball's momentum", "To reduce the force of impact by increasing time", "To stop the ball in the shortest time possible", "To make the ball bounce for a better grip"], 
                c: 1, 
                e: "Increasing the time taken to stop the ball reduces the rate of change of momentum, thereby reducing the impact force on the hands." 
            },
            { 
                q: "CASE STUDY: A student lists four forces: (1) Magnetic pull on a pin, (2) Electrostatic attraction of hair, (3) Friction between tires and road, and (4) Gravity. Which one is the 'Odd One Out' regarding contact?", 
                o: ["Magnetic Force", "Electrostatic Force", "Frictional Force", "Gravitational Force"], 
                c: 2, 
                e: "Friction is the only contact force listed; the others are non-contact (field) forces that act through space." 
            },
            { 
                q: "CASE STUDY: A spring balance is used to hang a metallic sphere. The internal spring stretches and the pointer moves down the scale. What specific physical quantity is being measured by the stretch of the spring?", 
                o: ["The volume of the sphere", "The mass of the sphere", "The gravitational force (Weight)", "The density of the metal"], 
                c: 2, 
                e: "A spring balance measures the force of gravity (Weight) acting on an object, usually calibrated in Newtons." 
            },
            { 
                q: "CASE STUDY: A rescue boat is being towed Northward by two separate cables. Cable A exerts a force of 150N and Cable B exerts a force of 250N. What is the total resultant force pulling the boat North?", 
                o: ["100N South", "100N North", "400N North", "0N"], 
                c: 2, 
                e: "When multiple forces act in the same direction, they are additive. 150N + 250N = 400N Northward." 
            }
        ];

        const finalPool = [
            { 
                q: "FINAL CHALLENGE: Two identical spring balances are linked in a vertical line (series). A 5kg weight (50N) is hung from the bottom balance. Analysis shows that tension is constant throughout the line. What does the top balance read?", 
                o: ["2.5 kg (it splits)", "5 kg (constant tension)", "0 kg (no direct weight)", "10 kg (cumulative)"], 
                c: 1, 
                e: "In a series connection, the full tension of the load is transmitted through both balances. Each balance 'feels' the full 5kg weight." 
            }
        ];

        let quizSet = [], currentIdx = 0, score = 0, timer, timeLeft = 45, locked = false, tries = 0;

        function clearOverlay() {
            document.getElementById('logo-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('logo-overlay').style.display = 'none';
                document.getElementById('scr-intro').classList.remove('hidden');
            }, 850);
        }
        setTimeout(clearOverlay, 2000);

        function initQuiz() {
            quizSet = [...corePool.sort(() => 0.5 - Math.random()).slice(0, 10), ...finalPool];
            document.getElementById('scr-intro').classList.add('hidden');
            document.getElementById('scr-quiz').classList.remove('hidden');
            render();
        }

        function render() {
            if(currentIdx >= quizSet.length) return end();
            locked = false; tries = 0; timeLeft = 45;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('q-num').innerText = `TASK ${currentIdx + 1}/${quizSet.length}`;
            document.getElementById('q-txt').innerText = quizSet[currentIdx].q;
            document.getElementById('q-txt').scrollTop = 0;

            const box = document.getElementById('options-box');
            box.innerHTML = '';
            quizSet[currentIdx].o.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = 'btn-opt'; b.innerText = txt;
                b.onclick = () => validate(i, b);
                box.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';
            timer = setInterval(() => {
                timeLeft--;
                bar.style.width = (timeLeft/45*100) + '%';
                if(timeLeft <= 0) { clearInterval(timer); showCorrect(false); }
            }, 1000);
        }

        function validate(idx, btn) {
            if(locked || btn.classList.contains('is-wrong')) return;
            const correct = quizSet[currentIdx].c;

            if(idx === correct) {
                locked = true; clearInterval(timer);
                btn.classList.add('is-correct');
                score += (tries === 0) ? 10 : 5;
                document.getElementById('score').innerText = "PTS: " + score;
                setTimeout(() => { currentIdx++; render(); }, 1500);
            } else {
                tries++;
                btn.classList.add('is-wrong');
                if(tries === 1) {
                    const fb = document.getElementById('feedback-box');
                    fb.innerText = "Incorrect. Re-read the scenario! (Look for key words like 'contact', 'direction', or 'constant'.)";
                    fb.classList.remove('hidden');
                } else {
                    locked = true; clearInterval(timer); showCorrect(true);
                }
            }
        }

        function showCorrect(wasWrong) {
            const btns = document.querySelectorAll('.btn-opt');
            btns[quizSet[currentIdx].c].classList.add('is-correct');
            const fb = document.getElementById('feedback-box');
            fb.innerHTML = `<strong>Concept Analysis:</strong> ${quizSet[currentIdx].e}`;
            fb.classList.remove('hidden');
            setTimeout(() => { currentIdx++; render(); }, 4000);
        }

        function end() {
            document.getElementById('scr-quiz').classList.add('hidden');
            document.getElementById('scr-result').classList.remove('hidden');
            document.getElementById('res-score').innerText = score + "/110";
            document.getElementById('res-desc').innerText = score >= 90 ? "Physics Mastermind! You have a perfect grasp of force dynamics." : "Well done! Review the case studies to sharpen your scientific reasoning.";
        }
    </script>
</body>
</html>
