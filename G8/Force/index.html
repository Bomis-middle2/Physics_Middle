<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Force Master</title>

<style>
:root {
    --primary:#0f172a; --accent:#2563eb; 
    --success:#059669; --error:#dc2626; --bg:#f8fafc;
}

* { box-sizing:border-box; font-family:system-ui; }

body{
    margin:0;
    background:var(--bg);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* ✅ RESPONSIVE CARD */
.card{
    width:100%;
    max-width:500px;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* ✅ MOBILE SAFE */
.hidden{ display:none; }

.q-text{
    font-weight:700;
    margin-bottom:15px;
}

.options-grid{
    display:grid;
    gap:10px;
}

.btn-opt{
    padding:12px;
    border-radius:10px;
    border:2px solid #e5e7eb;
    background:white;
    cursor:pointer;
    text-align:left;
}

.btn-opt:hover{
    background:#f1f5f9;
}

.is-correct{ background:var(--success); color:white; }
.is-wrong{ background:var(--error); color:white; }

.btn-prime{
    padding:14px 30px;
    background:var(--accent);
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    width:100%;
}

/* ✅ TIMER */
.timer{
    height:5px;
    background:#e5e7eb;
    margin-bottom:15px;
}
#bar{
    height:100%;
    background:var(--accent);
    width:100%;
}

#feedback{
    margin-top:10px;
    background:#fff7ed;
    padding:10px;
}

/* ✅ LOGO */
#logo{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
}
</style>
</head>

<body>

<div id="logo">
    <h1>Innovine</h1>
</div>

<!-- INTRO -->
<div id="intro" class="card hidden">
<h2>FORCE MASTER</h2>
<p>Physics Quiz</p>
<button class="btn-prime" onclick="startQuiz()">START</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="card hidden">
<div style="display:flex;justify-content:space-between">
<span id="qnum"></span>
<span id="score"></span>
</div>

<div class="timer"><div id="bar"></div></div>

<div id="qtxt" class="q-text"></div>
<div id="opts" class="options-grid"></div>
<div id="feedback" class="hidden"></div>
</div>

<!-- RESULT -->
<div id="result" class="card hidden">
<h2>Finished</h2>
<h1 id="finalScore"></h1>
<button class="btn-prime" onclick="location.reload()">Restart</button>
</div>

<script>

/* ✅ QUESTIONS (DESCRIPTIVE) */
const qs=[
{q:"A potter presses clay on a spinning wheel. What effect of force is shown?",
o:["Speed change","Stop","Shape change","Direction change"],c:2,e:"Force changes shape."},

{q:"A moving football is kicked in same direction. Result?",
o:["Stops","Reverse","Speed increases","Mass increases"],c:2,e:"Force increases speed."},

{q:"50N left vs 30N right. Result?",
o:["80N right","20N left","20N right","0"],c:1,e:"50-30=20 left"},
    
{q:"Which is non-contact force?",
o:["Push","Catch","Magnet","Kick"],c:2,e:"Magnetic is non-contact"},

{q:"Astronaut goes to Moon. Same?",
o:["Weight","Mass","Gravity","Scale"],c:1,e:"Mass constant"},

{q:"10kg, g=10. Weight?",
o:["10","1","100","0"],c:2,e:"mg=100N"},

{q:"Why pull hands while catching?",
o:["Increase force","Reduce force","Stop fast","Style"],c:1,e:"More time less force"},

{q:"Odd one?",
o:["Magnetic","Electrostatic","Friction","Gravitational"],c:2,e:"Friction contact"},

{q:"Spring balance measures?",
o:["Mass","Weight","Volume","Speed"],c:1,e:"Force"},

{q:"10N + 15N same dir?",
o:["5","5 opposite","25","0"],c:2,e:"Add"}];

let i=0,score=0,time=30,t,tries=0,lock=false;

/* ✅ FIX: LOGO → INTRO */
setTimeout(()=>{
document.getElementById("logo").style.display="none";
document.getElementById("intro").classList.remove("hidden");
},1500);

/* ✅ START WORKS */
function startQuiz(){
document.getElementById("intro").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
loadQ();
}

function loadQ(){
if(i>=qs.length)return end();

tries=0;lock=false;time=30;
document.getElementById("feedback").classList.add("hidden");

document.getElementById("qnum").innerText="Q "+(i+1);
document.getElementById("score").innerText="Score "+score;

document.getElementById("qtxt").innerText=qs[i].q;

let box=document.getElementById("opts"); box.innerHTML="";

qs[i].o.forEach((t,idx)=>{
let b=document.createElement("button");
b.className="btn-opt";
b.innerText=t;
b.onclick=()=>check(idx,b);
box.appendChild(b);
});

timer();
}

function timer(){
clearInterval(t);
t=setInterval(()=>{
time--;
document.getElementById("bar").style.width=(time/30*100)+"%";
if(time<=0){clearInterval(t);reveal();}
},1000);
}

function check(idx,btn){
if(lock)return;

if(idx===qs[i].c){
lock=true;
btn.classList.add("is-correct");
score+= (tries==0?10:5);
setTimeout(()=>{i++;loadQ();},1000);
}else{
tries++;
btn.classList.add("is-wrong");

if(tries==2){lock=true;reveal();}
else showHint();
}
}

function reveal(){
document.querySelectorAll(".btn-opt")[qs[i].c].classList.add("is-correct");

let fb=document.getElementById("feedback");
fb.innerText=qs[i].e;
fb.classList.remove("hidden");

setTimeout(()=>{i++;loadQ();},2000);
}

function showHint(){
let fb=document.getElementById("feedback");
fb.innerText="Try again!";
fb.classList.remove("hidden");
}

function end(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
document.getElementById("finalScore").innerText=score;
}

</script>

</body>
</html>
