<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovine | Force Mastery</title>
    <style>
        :root { --p: #3b82f6; --s: #10b981; --e: #ef4444; --bg: #f8fafc; --txt: #1e293b; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--txt); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* MANDATORY LOGO SCREEN */
        #logo-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.6s ease;
        }
        #logo-screen img { width: 220px; max-width: 80%; }

        #theme-layer { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 1; background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); pointer-events: none; }

        .card {
            width: 92%; max-width: 520px; background: white; padding: 35px;
            border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center; position: relative; z-index: 10;
        }
        .hidden { display: none !important; }

        .stats { display: flex; justify-content: space-between; font-weight: 700; color: var(--p); margin-bottom: 10px; font-size: 0.85rem; letter-spacing: 1px; }
        .timer-track { height: 6px; background: #e2e8f0; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--p); width: 100%; transition: width 1s linear; }

        .q-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 25px; line-height: 1.5; color: #334155; text-align: left; }

        .grid { display: grid; gap: 12px; }
        .btn-opt {
            padding: 16px; border: 2px solid #e2e8f0; border-radius: 14px;
            background: white; cursor: pointer; transition: 0.2s; font-size: 1rem; text-align: left; font-weight: 500;
        }
        .btn-opt:hover:not(:disabled) { border-color: var(--p); background: #f0f7ff; transform: scale(1.01); }
        .is-correct { background: var(--s) !important; color: white; border-color: var(--s); }
        .is-wrong { background: var(--e) !important; color: white; border-color: var(--e); }

        .btn-go { padding: 18px 50px; background: var(--p); color: white; border: none; border-radius: 50px; font-size: 1.1rem; cursor: pointer; font-weight: 700; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); transition: 0.3s; }
        .btn-go:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(59, 130, 246, 0.4); }
        
        #feedback { margin-top: 20px; padding: 18px; background: #fffbeb; border-radius: 14px; border-left: 6px solid #f59e0b; text-align: left; font-size: 0.9rem; color: #92400e; line-height: 1.4; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .sparkle { position: absolute; pointer-events: none; animation: fly 0.8s forwards; font-size: 20px; color: #facc15; }
        @keyframes fly { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-80px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="theme-layer"></div>

    <div id="logo-screen">
        <img src="assets/logo.png" alt="Innovine Logo" onerror="this.parentElement.innerHTML='<h1>INNOVINE</h1>'">
    </div>

    <div id="scr-intro" class="card hidden">
        <h1 style="color:var(--p); margin-top:0; font-size: 2rem;">G8 Physics</h1>
        <p style="font-weight: 600; color: #475569; margin-top: -10px;">Chapter 1: Force Mastery</p>
        <div style="text-align: left; font-size: 0.85rem; background: #f1f5f9; padding: 20px; border-radius: 16px; margin: 25px 0; color: #64748b; line-height: 1.6;">
            • 10 Randomized Competency Questions<br>
            • Focused on Logic and Real-world Physics<br>
            • 45s per task | Double Attempt protocol active
        </div>
        <button class="btn-go" onclick="init()">Start Mission</button>
    </div>

    <div id="scr-game" class="card hidden">
        <div class="stats">
            <span>TASK <span id="q-now">1</span>/10</span>
            <span id="score-now">PTS: 0</span>
        </div>
        <div class="timer-track"><div id="timer-bar"></div></div>
        <div id="q-txt" class="q-text"></div>
        <div id="options" class="grid"></div>
        <div id="feedback" class="hidden"></div>
    </div>

    <div id="scr-result" class="card hidden">
        <h2 id="res-msg">Analysis Complete</h2>
        <div id="res-score" style="font-size:3.5rem; margin:15px 0; font-weight:900; color:var(--p);"></div>
        <p id="res-comment" style="margin-bottom:30px; font-weight: 600; color: #64748b;"></p>
        <button class="btn-go" onclick="location.reload()">Re-Initialize</button>
    </div>

    <script>
        const fullDb = [
            { q: "A crane lifts a beam: Cable pulls up (12,000 N), Gravity pulls down (11,500 N), Air resistance adds 100 N down. What is the Resultant Force?", o: ["12,000 N Upward", "500 N Upward", "400 N Upward", "600 N Downward"], c: 2, e: "Total downward = 11,500 + 100 = 11,600 N. Resultant = 12,000 - 11,600 = 400 N Upward." },
            { q: "Tug-of-war: Team A pulls 2000 N. A new player joins Team B, and the rope moves toward B with a 50 N resultant force. Team B's total force?", o: ["1950 N", "2050 N", "2100 N", "2000 N"], c: 1, e: "Resultant = Force B - Force A. 50 = X - 2000. X = 2050 N." },
            { q: "Person X pushes North (10 N) and Person Y pushes East (10 N). Why does the object move North-East?", o: ["North is stronger", "Forces cancel out", "Resultant of non-linear forces acts along the diagonal", "Force works in straight lines"], c: 2, e: "When forces act at an angle, the resultant direction is the diagonal of the force vectors." },
            { q: "Car on a hill: Gravity pulls down slope (3000 N), Brakes pull up (3000 N). A child pushes downhill with 10 N. What happens?", o: ["Stays still", "Moves downhill", "Moves uphill", "Brakes increase force"], c: 1, e: "The child's 10 N makes the force unbalanced (Net = 10 N downhill), causing motion." },
            { q: "In which of the following cases is the Resultant Force zero?", o: ["A ball falling", "A car turning a corner", "A book resting on a table", "A rocket taking off"], c: 2, e: "A stationary book has balanced forces (Weight = Normal Force), so Resultant = 0." },
            { q: "A skydiver feels an upward 'jerk' from air hitting the parachute fabric. How is this force classified?", o: ["Contact Force (Air Resistance)", "Non-contact Force (Gravity)", "Magnetic Force", "Electrostatic Force"], c: 0, e: "Air resistance requires physical contact between the air molecules and the parachute." },
            { q: "A rubbed comb attracts paper pieces without touching them. This is an example of:", o: ["Muscular Force", "Magnetic Force", "Non-contact Force (Electrostatic)", "Frictional Force"], c: 2, e: "Electrostatic force acts over a distance without physical contact." },
            { q: "A magnetic crane lifts car bodies before even touching them. This proves:", o: ["Magnetic force is contact", "Magnetic force is non-contact", "The car is alive", "Gravity stopped"], c: 1, e: "Magnets exert force through a magnetic field, which is a non-contact interaction." },
            { q: "Which activity depends ENTIRELY on Muscular Force?", o: ["Magnet pulling needle", "Apple falling", "Weightlifter holding a barbell", "Scale attracting hair"], c: 2, e: "Muscular force is a contact force exerted by the action of muscles." },
            { q: "A rolling ball eventually stops. Which two forces were acting on it?", o: ["Magnetic and Electrostatic", "Gravity and Friction", "Muscular and Magnetic", "Only Gravity"], c: 1, e: "Gravity acts downward (non-contact) and Friction acts against motion (contact)." },
            { q: "A rover has a mass of 120 kg on Earth. On the Moon (1/6th gravity), what is its mass?", o: ["20 kg", "120 kg", "720 kg", "0 kg"], c: 1, e: "Mass is the amount of matter and never changes based on location or gravity." },
            { q: "If a bag has a mass of 5 kg, what is its approximate weight on Earth? (g=10)", o: ["5 N", "0.5 N", "50 N", "500 N"], c: 2, e: "Weight = Mass x Gravity = 5 kg x 10 N/kg = 50 N." },
            { q: "Planet X has double Earth's gravity. If you weigh 500 N on Earth, what is your weight on X?", o: ["250 N", "500 N", "1000 N", "100 N"], c: 2, e: "Weight is directly proportional to gravity. Double gravity means double weight." },
            { q: "Which instrument gives the SAME reading on Jupiter as it did on Earth?", o: ["Spring Balance", "Beam Balance", "Weighing Scale", "All of the above"], c: 1, e: "Beam balances compare two masses. Since gravity changes equally on both sides, the mass reading stays the same." },
            { q: "Why does a person in a falling elevator (broken cable) feel 'weightless'?", o: ["Gravity vanished", "Mass is zero", "No contact force from the floor to oppose gravity", "Moving too fast"], c: 2, e: "Weight is felt through the reaction force of the floor. In free-fall, that reaction is zero." },
            { q: "A spring balance measures 10 N. If the spring inside snaps, the pointer will show:", o: ["0 N", "10 N", "Maximum reading", "5 N"], c: 0, e: "A spring balance works on tension. If the spring breaks, there is no tension to move the pointer." },
            { q: "Force applied to a sponge changes its shape, but not a brick. Why?", o: ["Force only on sponge", "Rigidity of material", "Brick has no mass", "Solid shape law"], c: 1, e: "The effect of force on shape depends on how rigid or elastic the object's material is." },
            { q: "A batsman hits a ball and it flies to the boundary. Which effect of force is prominent?", o: ["Change in mass", "Change in direction of motion", "Change in shape", "Rest to motion"], c: 1, e: "The batsman uses force to change the direction of the already moving ball." },
            { q: "Pushing a toy car in the opposite direction of its 2 m/s motion will:", o: ["Decrease speed", "Increase speed", "Increase mass", "Change to non-contact"], c: 0, e: "Applying force opposite to motion causes deceleration (slowing down)." },
            { q: "Why is more force needed to start an iron ball moving than a plastic ball?", o: ["Iron is magnetic", "Inertia depends on mass", "Plastic has no gravity", "Friction only on iron"], c: 1, e: "Objects with more mass have more inertia, meaning they resist changes in motion more strongly." }
        ];

        let quizSet = [], idx = 0, score = 0, clock, time = 45, tries = 0, lock = false;

        // LOGO HANDLER
        window.addEventListener('load', () => {
            setTimeout(() => {
                const ls = document.getElementById('logo-screen');
                ls.style.opacity = '0';
                setTimeout(() => {
                    ls.classList.add('hidden');
                    const intro = document.getElementById('scr-intro');
                    intro.classList.remove('hidden');
                }, 600);
            }, 3000);
        });

        function init() {
            quizSet = [...fullDb].sort(() => 0.5 - Math.random()).slice(0, 10);
            document.getElementById('scr-intro').classList.add('hidden');
            document.getElementById('scr-game').classList.remove('hidden');
            render();
        }

        function render() {
            if(idx >= quizSet.length) return result();
            lock = false; tries = 0; time = 45;
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('q-now').innerText = idx + 1;
            document.getElementById('q-txt').innerText = quizSet[idx].q;
            const box = document.getElementById('options');
            box.innerHTML = '';
            quizSet[idx].o.forEach((t, i) => {
                const b = document.createElement('button');
                b.className = 'btn-opt'; b.innerText = t;
                b.onclick = () => check(i, b);
                box.appendChild(b);
            });
            startClock();
        }

        function startClock() {
            clearInterval(clock);
            const bar = document.getElementById('timer-bar');
            clock = setInterval(() => {
                time--;
                bar.style.width = (time/45*100) + '%';
                if(time <= 0) { clearInterval(clock); reveal(); }
            }, 1000);
        }

        function check(i, btn) {
            if(lock) return;
            if(i === quizSet[idx].c) {
                lock = true; clearInterval(clock);
                btn.classList.add('is-correct');
                score += (tries === 0) ? 10 : 5;
                document.getElementById('score-now').innerText = "PTS: " + score;
                fx(btn);
                setTimeout(() => { idx++; render(); }, 1500);
            } else {
                tries++;
                btn.classList.add('is-wrong'); btn.disabled = true;
                if(tries === 1) {
                    const fb = document.getElementById('feedback');
                    fb.innerText = "HINT: Re-examine the resultant math or core definitions.";
                    fb.classList.remove('hidden');
                } else {
                    lock = true; clearInterval(clock); reveal();
                }
            }
        }

        function reveal() {
            const btns = document.querySelectorAll('.btn-opt');
            btns[quizSet[idx].c].classList.add('is-correct');
            const fb = document.getElementById('feedback');
            fb.innerHTML = "<b>Logic:</b> " + quizSet[idx].e;
            fb.classList.remove('hidden');
            setTimeout(() => { idx++; render(); }, 4500);
        }

        function fx(el) {
            const r = el.getBoundingClientRect();
            for(let i=0; i<8; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle'; s.innerHTML = '★';
                s.style.left = (r.left + Math.random()*r.width) + 'px';
                s.style.top = r.top + 'px';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }
        }

        function result() {
            document.getElementById('scr-game').classList.add('hidden');
            document.getElementById('scr-result').classList.remove('hidden');
            document.getElementById('res-score').innerText = score + "/100";
            let m = score >= 80 ? "Master of Dynamics!" : score >= 50 ? "Physics Practitioner" : "Keep Experimenting!";
            document.getElementById('res-comment').innerText = m;
        }
    </script>
</body>
</html>
