<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Innovine | Physics Force Mastery</title>

<style>
:root {
    --primary: #0f172a; --accent: #2563eb; --success: #059669;
    --error: #dc2626; --bg: #f8fafc;
}

* { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }

body { 
    margin: 0; background: var(--bg); color: var(--primary); 
    display: flex; justify-content: center; align-items: center; 
    min-height: 100vh; width: 100vw; overflow: hidden;
}

#logo-overlay {
    position: fixed; inset: 0;
    background: #ffffff; display: flex; justify-content: center; align-items: center;
    z-index: 10000; transition: opacity 0.8s ease;
}

#logo-overlay img { width: 180px; }

#blueprint-bg {
    position: fixed; inset: 0;
    background-color: #f1f5f9;
    background-image: linear-gradient(#e2e8f0 1.5px, transparent 1.5px),
                       linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
    background-size: 30px 30px;
}

.card {
    width: 90%; max-width: 480px;
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    text-align: center;
    position: relative;
    z-index: 10;
}

.hidden { display: none; }

.q-text {
    font-size: 1.1rem;
    font-weight: 700;
    text-align: left;
    margin-bottom: 20px;
}

.options-grid { display: grid; gap: 10px; }

.btn-opt {
    padding: 14px;
    border-radius: 10px;
    border: 2px solid #e2e8f0;
    background: white;
    cursor: pointer;
    text-align: left;
    font-weight: 600;
}

.is-correct { background: var(--success); color: white; }
.is-wrong { background: var(--error); color: white; }

.btn-prime {
    padding: 14px 35px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
}

.timer-track { height: 4px; background: #e2e8f0; margin-bottom: 20px; }
#timer-bar { height: 100%; background: var(--accent); width: 100%; }

#feedback-box {
    margin-top: 10px;
    padding: 10px;
    background: #fff7ed;
    border-left: 5px solid orange;
}
</style>
</head>

<body>

<div id="blueprint-bg"></div>

<div id="logo-overlay">
<img src="assets/logo.png">
</div>

<div id="scr-intro" class="card hidden">
<h2 style="color:var(--accent)">FORCE MASTER</h2>
<p>Grade 8 Physics Quiz</p>
<button class="btn-prime" onclick="initQuiz()">START</button>
</div>

<div id="scr-quiz" class="card hidden">
<div style="display:flex; justify-content:space-between;">
<span id="q-num"></span>
<span id="score"></span>
</div>
<div class="timer-track"><div id="timer-bar"></div></div>
<div id="q-txt" class="q-text"></div>
<div id="options-box" class="options-grid"></div>
<div id="feedback-box" class="hidden"></div>
</div>

<div id="scr-result" class="card hidden">
<h2>Mission Complete</h2>
<p id="res-score"></p>
<button class="btn-prime" onclick="location.reload()">Restart</button>
</div>

<script>

// ✅ DESCRIPTIVE QUESTIONS
const corePool = [
{ q: "A potter is shaping clay by pressing it while it spins on a wheel. Which effect of force is shown?",
  o: ["Change in speed","Stopping motion","Change in shape and size","Change in direction"], c:2,
  e:"Force can change shape." },

{ q: "A football is moving and is kicked again in the same direction. What happens?",
  o:["It stops","It turns back","Speed increases","Mass increases"], c:2,
  e:"Same direction force increases speed." },

{ q: "Two people pull a rope: 50N left and 30N right. What is the result?",
  o:["80N right","20N left","20N right","0N"], c:1,
  e:"50-30 = 20N left." },

{ q: "Which is a non-contact force?",
  o:["Push trolley","Catch ball","Magnet attracts nails","Kick stone"], c:2,
  e:"Magnetic force acts without contact." },

{ q: "An astronaut goes to the Moon. What stays same?",
  o:["Weight","Mass","Gravity","Scale reading"], c:1,
  e:"Mass is constant." },

{ q: "A 10 kg object on Earth (g=10). Its weight?",
  o:["10N","1N","100N","0N"], c:2,
  e:"Weight = m × g." },

{ q: "Why does a player pull hands back while catching?",
  o:["Increase force","Reduce impact force","Stop instantly","Style"], c:1,
  e:"More time = less force." },

{ q: "Find the odd one:",
  o:["Magnetic","Electrostatic","Frictional","Gravitational"], c:2,
  e:"Friction is contact force." },

{ q: "Spring balance measures:",
  o:["Mass","Weight","Volume","Speed"], c:1,
  e:"Measures force." },

{ q: "Two forces 10N and 15N act in same direction. Result?",
  o:["5N","5N opposite","25N","0N"], c:2,
  e:"They add up." }
];

const finalPool = [
{ q: "A 5 kg weight is hung using two spring balances in series. Top reads?",
  o:["2.5 kg","5 kg","0 kg","10 kg"], c:1,
  e:"Tension same throughout." }
];

let quizSet=[],currentIdx=0,score=0,timer,timeLeft=45,tries=0,locked=false;

setTimeout(()=>{
document.getElementById("logo-overlay").style.opacity=0;
setTimeout(()=>{document.getElementById("scr-intro").classList.remove("hidden");},800);
},2000);

function initQuiz(){
quizSet=[...corePool.sort(()=>0.5-Math.random()).slice(0,10),...finalPool];
document.getElementById("scr-intro").classList.add("hidden");
document.getElementById("scr-quiz").classList.remove("hidden");
render();
}

function render(){
if(currentIdx>=quizSet.length)return end();

locked=false;tries=0;timeLeft=45;
document.getElementById("feedback-box").classList.add("hidden");

document.getElementById("q-num").innerText=`Q ${currentIdx+1}/11`;
document.getElementById("score").innerText=`Score: ${score}`;
document.getElementById("q-txt").innerText=quizSet[currentIdx].q;

const box=document.getElementById("options-box");
box.innerHTML="";

quizSet[currentIdx].o.forEach((t,i)=>{
const b=document.createElement("button");
b.innerText=t;
b.className="btn-opt";
b.onclick=()=>validate(i,b);
box.appendChild(b);
});

startTimer();
}

function startTimer(){
clearInterval(timer);
timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer-bar").style.width=(timeLeft/45*100)+"%";
if(timeLeft<=0){clearInterval(timer);showCorrect();}
},1000);
}

function validate(i,btn){
if(locked)return;

let correct=quizSet[currentIdx].c;

if(i==correct){
locked=true;
clearInterval(timer);
btn.classList.add("is-correct");
score+=(tries==0?10:5);
setTimeout(()=>{currentIdx++;render();},1200);
}else{
tries++;
btn.classList.add("is-wrong");

if(tries==2){
locked=true;
clearInterval(timer);
showCorrect();
}else{
showHint();
}
}
}

function showHint(){
let fb=document.getElementById("feedback-box");
fb.innerText="Try again carefully!";
fb.classList.remove("hidden");
}

function showCorrect(){
document.querySelectorAll(".btn-opt")[quizSet[currentIdx].c].classList.add("is-correct");

let fb=document.getElementById("feedback-box");
fb.innerHTML="<b>Concept:</b> "+quizSet[currentIdx].e;
fb.classList.remove("hidden");

setTimeout(()=>{currentIdx++;render();},2500);
}

function end(){
document.getElementById("scr-quiz").classList.add("hidden");
document.getElementById("scr-result").classList.remove("hidden");
document.getElementById("res-score").innerText=score+"/110";
}

</script>

</body>
</html>
