<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Force Interactive Quiz - Grade 8</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #f0f4f8;
            --text: #2c3e50;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: box-shadow 0.3s ease;
        }

        /* Background Animation */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        }

        /* Branding Overlay */
        #branding-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #branding-overlay img { width: 200px; height: auto; }

        /* Container */
        .quiz-container {
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        .hidden { display: none; }

        /* UI Elements */
        .timer-bar {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }

        .timer-progress {
            height: 100%;
            background: var(--primary);
            width: 100%;
            transition: width 1s linear;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question-text { font-size: 1.2rem; margin-bottom: 20px; line-height: 1.4; }
        
        .q-image { max-width: 100%; height: 150px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; background: #f9f9f9; }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #f7f9fc; }
        .correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        .btn-main {
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Star Animation */
        @keyframes starPop {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }
        .star { position: absolute; color: #f1c40f; font-size: 20px; pointer-events: none; animation: starPop 0.8s ease-out forwards; }
    </style>
</head>
<body>

    <div id="branding-overlay">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>

    <div class="stars-container" id="stars"></div>

    <div id="intro-screen" class="quiz-container">
        <h1>Force Mastery</h1>
        <p>Grade 8 | Science</p>
        <p>Test your knowledge on motion, gravity, and types of forces!</p>
        <button class="btn-main" onclick="startQuiz()">Start Challenge</button>
    </div>

    <div id="quiz-screen" class="quiz-container hidden">
        <div class="stats">
            <span>Q: <span id="q-num">1</span>/10</span>
            <span>Score: <span id="score">0</span></span>
        </div>
        <div class="timer-bar"><div id="timer" class="timer-progress"></div></div>
        <div id="question-content">
            <img id="question-img" class="q-image hidden" src="" alt="Force illustration">
            <p class="question-text" id="question-text"></p>
            <div class="options-grid" id="options-container"></div>
        </div>
        <div id="explanation" class="hidden" style="margin-top:15px; padding:12px; background:#fff3cd; border-radius:8px; font-size:0.9rem; border-left: 5px solid var(--secondary);"></div>
    </div>

    <div id="result-screen" class="quiz-container hidden">
        <h2 id="result-title">Challenge Complete!</h2>
        <p style="font-size: 1.5rem;">Total Points: <span id="final-score">0</span>/100</p>
        <button class="btn-main" onclick="location.reload()">Restart Quiz</button>
    </div>

    <audio id="audio-correct" src="assets/correct.mp3"></audio>
    <audio id="audio-wrong" src="assets/wrong.mp3"></audio>
