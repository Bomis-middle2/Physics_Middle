<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 8 | Physics Mastery Interactive</title>
    <style>
        :root {
            --primary: #1e293b; --accent: #3b82f6; --success: #10b981;
            --error: #ef4444; --bg: #f8fafc;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* SCIENTIFIC GRID BACKGROUND */
        #blueprint-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background-color: #f1f5f9;
            background-image: linear-gradient(#e2e8f0 1.5px, transparent 1.5px), linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 40px 40px; pointer-events: none;
        }

        /* LOGO OVERLAY */
        #logo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.6s ease;
        }
        #logo-overlay img { width: 220px; height: auto; }

        /* INTERACTIVE CARD */
        .card {
            width: 94%; max-width: 580px; background: rgba(255, 255, 255, 0.98);
            padding: 30px; border-radius: 20px; border: 2px solid #cbd5e1;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            text-align: center; position: relative; z-index: 100;
        }
        .hidden { display: none !important; }

        /* UI ELEMENTS */
        .header-box { display: flex; justify-content: space-between; font-weight: 800; color: var(--accent); margin-bottom: 12px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .timer-track { height: 6px; background: #e2e8f0; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--accent); width: 100%; transition: width 1s linear; }

        .q-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; background: #dbeafe; color: var(--accent); font-size: 0.75rem; font-weight: 700; margin-bottom: 15px; }
        .q-text { font-size: 1.15rem; font-weight: 600; text-align: left; line-height: 1.4; margin-bottom: 25px; color: #0f172a; }

        .options-grid { display: grid; gap: 10px; }
        .btn-opt {
            padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px;
            background: white; cursor: pointer; transition: 0.2s;
            font-size: 0.95rem; text-align: left; font-weight: 500;
        }
        .btn-opt:hover:not(:disabled) { border-color: var(--accent); background: #f0f9ff; }
        .is-correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .is-wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        .btn-prime {
            padding: 18px 45px; background: var(--accent); color: white; border: none;
            border-radius: 50px; font-size: 1.1rem; cursor: pointer; font-weight: 800;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        #feedback-box { margin-top: 20px; padding: 15px; background: #fffbeb; border-radius: 12px; border-left: 5px solid #f59e0b; text-align: left; font-size: 0.9rem; line-height: 1.5; color: #92400e; }

        /* SPARKLES */
        .sparkle { position: absolute; pointer-events: none; animation: fly 0.8s forwards; font-size: 20px; color: #facc15; z-index: 200; }
        @keyframes fly { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-80px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="blueprint-bg"></div>

    <div id="logo-overlay">
        <img src="assets/logo.png" alt="Innovine" onerror="this.style.display='none'">
    </div>

    <div id="scr-intro" class="card">
        <h1 style="color:var(--accent); margin-bottom: 5px;">PHYSICS MASTERY</h1>
        <p style="color: #64748b; font-weight: 600;">Grade 8 Comprehensive Challenge</p>
        <div style="text-align: left; background: #f8fafc; padding: 15px; border-radius: 12px; margin: 20px 0; font-size: 0.9rem;">
            <p>• 9 Random Concepts + 2 Final Challenges</p>
            <p>• 45 Seconds per question</p>
            <p>• reasoning-based learning</p>
        </div>
        <button class="btn-prime" onclick="initQuiz()">Start Mission</button>
    </div>

    <div id="scr-quiz" class="card hidden">
        <div class="header-box">
            <span id="q-number-display">QUESTION 1/11</span>
            <span id="score-display">SCORE: 0</span>
        </div>
        <div class="timer-track"><div id="timer-bar"></div></div>
        <div id="q-content">
            <div id="q-category" class="q-tag">FORCE</div>
            <div id="q-txt" class="q-text"></div>
            <div id="options-box" class="options-grid"></div>
        </div>
        <div id="feedback-box" class="hidden"></div>
    </div>

    <div id="scr-result" class="card hidden">
        <h2 id="res-title">Mission Complete</h2>
        <p id="res-score" style="font-size:3rem; font-weight:900; margin:10px 0; color:var(--accent);"></p>
        <p id="res-desc" style="color:#64748b; line-height:1.5; margin-bottom:25px;"></p>
        <button class="btn-prime" onclick="location.reload()">Restart Challenge</button>
    </div>

    <audio id="aud-right" src="assets/correct.mp3"></audio>
    <audio id="aud-wrong" src="assets/wrong.mp3"></audio>

    <script>
        const rawPool = [
            // Chapter 1: Force
            { tag: "FORCE", q: "Team A pulls with 1200 N. Team B pulls with 1250 N. A player from B slips, reducing force by 80 N. Which way will the rope move?", o: ["Towards Team B with 50 N", "Towards Team B with 30 N", "Towards Team A with 30 N", "Stationary"], c: 2, e: "New Team B = 1170N (1250-80). Net Force = 1200 - 1170 = 30 N towards Team A." },
            { tag: "FORCE", q: "A ball rolls on a frictionless surface. A force is applied exactly perpendicular (90°) to its motion. What is the effect?", o: ["Speed increases", "Speed decreases", "Speed same, direction changes", "Immediately stops"], c: 2, e: "Force perpendicular to motion acts as centripetal force, changing direction only." },
            { tag: "FORCE", q: "An object weighs 600 N on Earth (g=10). On a planet with 1/3 gravity, what are its Mass and Weight?", o: ["Mass=20kg, Weight=200N", "Mass=60kg, Weight=200N", "Mass=60kg, Weight=600N", "Mass=20kg, Weight=600N"], c: 1, e: "Mass (60kg) is constant. New Weight = 600/3 = 200 N." },
            { tag: "FORCE", q: "A plastic comb rubbed on hair attracts a water stream. This demonstrates:", o: ["Magnetic force", "Gravitational pull", "Electrostatic force", "Air pressure"], c: 2, e: "Friction transfers electrons, creating a non-contact electrostatic force." },
            // Chapter 2: Pressure
            { tag: "PRESSURE", q: "Three containers (Water, Oil, Mercury) are filled to the same height. Mercury is densest. Where is base pressure highest?", o: ["Oil", "Mercury", "All same", "Depends on shape"], c: 1, e: "Pressure = hρg. Since height is same, the fluid with higher density (Mercury) exerts more pressure." },
            { tag: "PRESSURE", q: "Why are the foundations of high-rise buildings made very wide?", o: ["Save materials", "Reduce pressure on ground", "Look taller", "Increase friction"], c: 1, e: "P = Force/Area. Increasing Area reduces Pressure, preventing the building from sinking." },
            { tag: "PRESSURE", q: "A fountain pen leaks at a mountain summit. Why?", o: ["Low temperature", "Low atmospheric pressure", "Stronger gravity", "Magnetic rocks"], c: 1, e: "External pressure drops; air inside the pen expands and pushes the ink out." },
            // Chapter 3: Friction
            { tag: "FRICTION", q: "To make an underwater drone move faster, which modification is most effective?", o: ["Bright color", "Streamlined shape", "Increase weight", "Rough surface"], c: 1, e: "Streamlining reduces 'drag' (fluid friction) by allowing water to flow smoothly." },
            { tag: "FRICTION", q: "A student says: 'Oil can reduce machine friction to zero.' Is this true?", o: ["Yes, with enough oil", "No, irregularities always remain", "No, oil increases friction", "Depends on speed"], c: 1, e: "Microscopic irregularities always exist; lubricants reduce but never eliminate friction." },
            // Chapter 4: Sound
            { tag: "SOUND", q: "Guitar string vibrates 400 times in 2s. Drum vibrates 100 times in 2s. Compare them:", o: ["Drum has higher pitch", "Guitar has higher pitch (200 Hz)", "Same pitch", "Guitar has 0.5 Hz frequency"], c: 1, e: "Frequency = 400/2 = 200Hz. Higher frequency = higher pitch." },
            { tag: "SOUND", q: "Why is an approaching train heard clearly through a steel rail vs through air?", o: ["Steel is magnetic", "Sound travels faster in solids", "Air is too noisy", "Rail acts as microphone"], c: 1, e: "Densely packed particles in solids transfer vibrations much faster than in gases." },
            // Chapter 5: Light
            { tag: "LIGHT", q: "An archer sees a fish in water. To hit it, where should he aim?", o: ["Directly at the fish", "Slightly below", "Slightly above", "Aiming doesn't matter"], c: 1, e: "Refraction makes the fish appear shallower (Virtual Image) than its actual position." },
            // Chapter 6: Electricity
            { tag: "ELECTRICITY", q: "How can you increase the strength of an electromagnet to pick up more clips?", o: ["Use plastic core", "Shorten wire", "Increase turns or current", "Reverse battery"], c: 2, e: "Electromagnet strength is proportional to the number of coils and the current flow." },
            // Chapter 7: Natural Phenomena
            { tag: "NATURAL PHENOMENA", q: "Touching a doorknob after walking on carpet causes a 'zap'. Why?", o: ["Knob was plugged in", "Static discharge after friction", "Magnetic carpet", "Electric eel effect"], c: 1, e: "Friction transfers electrons to you; metal allows them to discharge quickly." }
        ];

        // The "Final Challenge" high-difficulty items
        const finalPool = [
            { tag: "FINAL CHALLENGE", q: "If two identical spring balances are connected in a line (series) and a 5 kg weight is hung from the bottom, the top balance reads:", o: ["2.5 kg", "5 kg", "0 kg", "10 kg"], c: 1, e: "Tension is identical throughout a series connection; both balances feel the full load." },
            { tag: "FINAL CHALLENGE", q: "A 2kg toy car is pulled left with 10N and right with 10N. A third force of 2N is added to the right. The resultant is:", o: ["22 N right", "0 N", "2 N right", "2 N left"], c: 2, e: "Balanced forces (10N-10N) cancel; the 2N force becomes the net unbalanced force." },
            { tag: "FINAL CHALLENGE", q: "A metal sphere stops and dents a clay block. Which effect of force is NOT present?", o: ["Change in speed", "Change in shape", "Change in mass", "Contact force"], c: 2, e: "Force can change speed/shape but cannot alter the amount of matter (mass)." }
        ];

        let quizSet = [], currentIdx = 0, score = 0, timer, timeLeft = 45, tries = 0, locked = false;

        // Branding Removal
        setTimeout(() => {
            const overlay = document.getElementById('logo-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 600);
        }, 5000);

        function initQuiz() {
            // Shuffle and pick 9 from raw, then add 2 from final challenge
            const shuffledRaw = [...rawPool].sort(() => 0.5 - Math.random());
            const shuffledFinal = [...finalPool].sort(() => 0.5 - Math.random());
            quizSet = [...shuffledRaw.slice(0, 9), ...shuffledFinal.slice(0, 2)];
            
            document.getElementById('scr-intro').classList.add('hidden');
            document.getElementById('scr-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            if(currentIdx >= quizSet.length) return endQuiz();
            locked = false; tries = 0; timeLeft = 45;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('q-number-display').innerText = `QUESTION ${currentIdx + 1}/11`;
            
            const q = quizSet[currentIdx];
            document.getElementById('q-category').innerText = q.tag;
            document.getElementById('q-category').style.background = (q.tag === "FINAL CHALLENGE") ? "#fee2e2" : "#dbeafe";
            document.getElementById('q-category').style.color = (q.tag === "FINAL CHALLENGE") ? "#ef4444" : "#3b82f6";
            document.getElementById('q-txt').innerText = q.q;

            const box = document.getElementById('options-box');
            box.innerHTML = '';
            q.o.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = 'btn-opt'; b.innerText = txt;
                b.onclick = () => checkAnswer(i, b);
                box.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            const bar = document.getElementById('timer-bar');
            timer = setInterval(() => {
                timeLeft--;
                bar.style.width = (timeLeft/45*100) + '%';
                if(timeLeft <= 0) { clearInterval(timer); showCorrect(); }
            }, 1000);
        }

        function checkAnswer(idx, btn) {
            if(locked) return;
            const correct = quizSet[currentIdx].c;

            if(idx === correct) {
                locked = true; clearInterval(timer);
                btn.classList.add('is-correct');
                score += (tries === 0) ? 10 : 5;
                document.getElementById('score-display').innerText = "SCORE: " + score;
                playSfx('aud-right', () => {
                    setTimeout(() => { currentIdx++; renderQuestion(); }, 400);
                });
                doSparkles(btn);
            } else {
                tries++;
                btn.classList.add('is-wrong'); btn.disabled = true;
                playSfx('aud-wrong', () => {
                    if(tries === 1) {
                        const fb = document.getElementById('feedback-box');
                        fb.innerText = "Hint: Re-evaluate the scientific principle or math logic involved.";
                        fb.classList.remove('hidden');
                    } else {
                        locked = true; clearInterval(timer); showCorrect();
                    }
                });
            }
        }

        function showCorrect() {
            const btns = document.querySelectorAll('.btn-opt');
            btns[quizSet[currentIdx].c].classList.add('is-correct');
            const fb = document.getElementById('feedback-box');
            fb.innerHTML = `<strong>Answer: ${quizSet[currentIdx].o[quizSet[currentIdx].c]}</strong><br>${quizSet[currentIdx].e}`;
            fb.classList.remove('hidden');
            setTimeout(() => { currentIdx++; renderQuestion(); }, 5000);
        }

        function playSfx(id, cb) {
            const a = document.getElementById(id);
            if(a) {
                a.currentTime = 0; a.onended = cb;
                a.play().catch(() => setTimeout(cb, 800));
            } else cb();
        }

        function doSparkles(el) {
            const r = el.getBoundingClientRect();
            for(let i=0; i<10; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle'; s.innerHTML = '★';
                s.style.left = (r.left + Math.random()*r.width) + 'px';
                s.style.top = r.top + 'px';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }
        }

        function endQuiz() {
            document.getElementById('scr-quiz').classList.add('hidden');
            document.getElementById('scr-result').classList.remove('hidden');
            const p = (score/110)*100;
            document.getElementById('res-score').innerText = score + "/110";
            
            let t, d, c;
            if(p >= 75) { t = "Force Specialist"; d = "Exceptional reasoning! You’ve mastered Grade 8 Physics mechanics."; c = "#10b981"; }
            else if(p >= 40) { t = "Junior Engineer"; d = "Good progress. Review refraction and liquid pressure to reach Specialist rank."; c = "#f59e0b"; }
            else { t = "Physics Trainee"; d = "Let's apply some more force to your studies. Try re-reading the chapters."; c = "#ef4444"; }
            
            document.getElementById('res-title').innerText = t;
            document.getElementById('res-title').style.color = c;
            document.getElementById('res-desc').innerText = d;
        }
    </script>
</body>
</html>
