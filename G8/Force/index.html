<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G8 Physics | CBSE Force Mastery</title>
    <style>
        :root { 
            --p: #f8fafc; --text: #1e293b; --acc: #3b82f6; 
            --s: #10b981; --e: #ef4444; --warn: #f59e0b; 
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: var(--p); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        #blueprint {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 1;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: moveGrid 30s linear infinite;
        }

        .symbol {
            position: fixed; color: rgba(59, 130, 246, 0.12); font-weight: 800; 
            font-family: serif; pointer-events: none; z-index: 2; user-select: none;
        }

        @keyframes moveGrid { from { transform: translate(0, 0); } to { transform: translate(60px, 60px); } }
        @keyframes floatSymbol { from { transform: translate(0, 0) rotate(0deg); } to { transform: translate(var(--mx), var(--my)) rotate(360deg); } }

        .card {
            width: 92%; max-width: 600px; background: var(--glass); 
            padding: 2rem; border-radius: 24px; border: 1.5px solid rgba(59, 130, 246, 0.2);
            backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center; position: relative; z-index: 100;
            display: none; opacity: 0; transform: translateY(20px);
            transition: all 0.4s ease;
        }

        #logo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s;
        }

        .btn-opt {
            display: block; width: 100%; padding: 12px 18px; margin: 8px 0;
            background: white; border: 2px solid #e2e8f0;
            border-radius: 12px; color: var(--text); cursor: pointer; text-align: left;
            transition: 0.2s; font-weight: 500; font-size: 0.95rem;
        }
        .btn-opt:hover:not(:disabled) { border-color: var(--acc); background: #f0f9ff; transform: translateX(5px); }
        .is-correct { background: var(--s) !important; color: white; border-color: var(--s); }
        .is-wrong { background: var(--e) !important; color: white; border-color: var(--e); }

        .btn-main {
            padding: 16px 40px; background: var(--acc); color: white; border: none;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 20px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        #timer-track { height: 6px; background: #e2e8f0; margin: 15px 0; border-radius: 10px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--acc); width: 100%; transition: width 1s linear; }

        #feedback { margin-top: 15px; padding: 12px; background: #fffbeb; border-radius: 10px; border-left: 5px solid var(--warn); text-align: left; font-size: 0.85rem; color: #92400e; }

        @media (max-width: 600px) { .card { padding: 1.2rem; } h3 { font-size: 1rem; } .btn-opt { font-size: 0.85rem; padding: 10px; } }
    </style>
</head>
<body>

    <div id="blueprint"></div>
    <div id="symbol-container"></div>

    <div id="logo-overlay">
        <img src="assets/logo.png" alt="Innovine" style="width: 200px;" onerror="this.style.display='none'">
    </div>

    <div id="scr-intro" class="card">
        <h1 style="color:var(--acc); margin-bottom: 5px;">CBSE PHYSICS</h1>
        <p style="font-weight: 600; color: #64748b;">Force & Pressure Mastery</p>
        <div style="text-align: left; font-size: 0.85rem; background: #f1f5f9; padding: 15px; border-radius: 12px; margin: 15px 0;">
            • 10 Randomized Core Questions<br>
            • 1 Randomized FINAL CHALLENGE<br>
            • 2 Attempts | 45s Timer
        </div>
        <button class="btn-main" onclick="startQuiz()">INITIALIZE</button>
    </div>

    <div id="scr-quiz" class="card">
        <div style="display:flex; justify-content: space-between; font-size: 0.75rem; color: var(--acc); font-weight: 800;">
            <span id="q-num">STEP 1/11</span>
            <span id="score-now">PTS: 0</span>
        </div>
        <div id="timer-track"><div id="timer-bar"></div></div>
        <h3 id="q-txt" style="text-align:left; line-height: 1.4; margin-bottom: 15px;"></h3>
        <div id="options"></div>
        <div id="feedback" style="display:none;"></div>
    </div>

    <div id="scr-result" class="card">
        <h2 style="margin: 0;">REPORT GENERATED</h2>
        <div id="res-score" style="font-size:3.5rem; font-weight:900; color:var(--acc); margin: 10px 0;"></div>
        <p id="res-rank" style="font-weight: 800; color: var(--warn); margin: 5px 0;"></p>
        <p id="res-desc" style="margin-bottom: 20px; color: #64748b; font-size: 0.9rem;"></p>
        <button class="btn-main" onclick="location.reload()">RE-SYNC SYSTEM</button>
    </div>

    <script>
        // SYMBOLS
        const syms = ['F=ma', 'v=d/t', 'G', 'ΣF', 'm', 'a', 'W=mg', 'N', 'kg', 'Δ'];
        const container = document.getElementById('symbol-container');
        for(let i=0; i<20; i++) {
            const div = document.createElement('div');
            div.className = 'symbol';
            div.innerText = syms[Math.floor(Math.random()*syms.length)];
            div.style.left = Math.random()*100 + 'vw';
            div.style.top = Math.random()*100 + 'vh';
            div.style.setProperty('--mx', (Math.random()*300 - 150) + 'px');
            div.style.setProperty('--my', (Math.random()*300 - 150) + 'px');
            div.style.animation = `floatSymbol ${Math.random()*15 + 10}s linear infinite alternate`;
            container.appendChild(div);
        }

        setTimeout(() => {
            const overlay = document.getElementById('logo-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                const intro = document.getElementById('scr-intro');
                intro.style.display = 'block';
                setTimeout(() => { intro.style.opacity = '1'; intro.style.transform = 'translateY(0)'; }, 50);
            }, 800);
        }, 5000);

        const bigPool = [
            { q: "Two toy cars: A pushed with 5N Right. B pushed with 10N Right and 5N Left. Effect?", o: ["A moves faster", "B moves slower", "Both have same resultant (5N Right)", "B stays stationary"], c: 2, e: "10N - 5N = 5N resultant for Car B." },
            { q: "Forces: 10N North, 10N South, 5N West. Movement?", o: ["North", "South", "West", "None"], c: 2, e: "Vertical forces cancel; only 5N West remains." },
            { q: "Rocket thrust equals gravity + air resistance. It will:", o: ["Fall", "Stop mid-air", "Move at constant speed", "Accelerate"], c: 2, e: "Balanced forces = constant velocity." },
            { q: "Crate needs 50N to slide. People pull with 20N and 25N in same direction. Move?", o: ["Yes (45N)", "No (Resultant 45N < 50N)", "Yes (Any force)", "No (Must be equal)"], c: 1, e: "Static friction threshold not met." },
            { q: "Error check: 'Force only moves objects at rest.' Why?", o: ["Stops only", "Changes shape only", "Can change speed/direction of moving objects", "Stationary objects ignore force"], c: 2, e: "Force affects motion in all states." },
            { q: "Skydiver: gravity pull and upward drag. Classify:", o: ["Both contact", "Both non-contact", "Gravity non-contact; Drag contact", "Gravity contact; Drag non-contact"], c: 2, e: "Drag requires contact with air particles." },
            { q: "Why is 'Magnetic Force' non-contact?", o: ["Metal based", "Acts without touch", "Vacuum only", "Friction strength"], c: 1, e: "Magnetic fields interact over distances." },
            { q: "Which is NOT a contact force?", o: ["Muscular", "Frictional", "Electrostatic", "Tension"], c: 2, e: "Electrostatic attraction works without touch." },
            { q: "Force preventing slipping while walking?", o: ["Gravitational", "Muscular", "Frictional", "Electrostatic"], c: 2, e: "Friction provides ground grip." },
            { q: "Static scale Rubbed with silk held near copper wire. No attraction. Why?", o: ["Copper not magnetic", "Metals allow charge flow away", "Silk removes force", "Not rubbed enough"], c: 1, e: "Conductors dissipate static charge immediately." },
            { q: "Mass 12kg on Earth. Weight (g=10)?", o: ["1.2 N", "12 N", "120 N", "120 kg"], c: 2, e: "W = 12 x 10 = 120N." },
            { q: "Moon vs Earth: Which instrument reads differently?", o: ["Beam balance", "Spring balance", "Ruler", "Stopwatch"], c: 1, e: "Weight changes with gravity; mass doesn't." },
            { q: "Gravity doubles on Planet X. Effect?", o: ["Mass doubles", "Both same", "Mass same, Weight doubles", "Both double"], c: 2, e: "Mass is constant; weight is gravity-dependent." },
            { q: "Stone on spring balance submerged in water. Reading will:", o: ["Decrease (Buoyancy)", "Increase", "Stay same", "Zero"], c: 0, e: "Buoyant force acts upward." },
            { q: "Why measure Weight in Newtons?", o: ["It is speed", "It is force of gravity", "KG is for liquids", "Newton discovered Moon"], c: 1, e: "Weight is the force gravity exerts on mass." },
            { q: "Baker pressing dough. Primary effect?", o: ["Change speed", "Change direction", "Change shape/size", "Change mass"], c: 2, e: "Force deforms materials." },
            { q: "Goalkeeper catches a ball. Effect?", o: ["Changing state of motion", "Changing direction", "Changing mass", "Non-contact"], c: 0, e: "Motion to rest transition." },
            { q: "Compass needle deflects near magnet. Force can:", o: ["Change shape", "Change direction of motion", "Increase weight", "Stop vibration"], c: 1, e: "Magnetism alters the needle's orientation." },
            { q: "Push heavy wall, no move. Why?", o: ["No force", "Wall no mass", "Resultant didn't overcome inertia", "Small objects only"], c: 2, e: "Net force insufficient to initiate motion." },
            { q: "Same force on tennis vs bowling ball. Higher speed change?", o: ["Tennis (less mass)", "Bowling (larger)", "Both same", "Neither"], c: 0, e: "F=ma; less mass = more acceleration." }
        ];

        const finalChallenges = [
            { 
                q: "FINAL CHALLENGE: Team A and B are balanced in tug-of-war. Both suddenly pull twice as hard. Result?", 
                o: ["Rope moves to A", "Resultant stays Zero, Tension increases", "Resultant doubles", "Rope moves to B"], 
                c: 1, 
                e: "Forces still cancel (Resultant 0), but internal tension doubles, risking rope breakage." 
            },
            { 
                q: "FINAL CHALLENGE: Astronaut in ISS orbits Earth. Spring balance shows 0N weight. Why?", 
                o: ["No gravity in space", "Moving too fast", "State of Free Fall", "Vacuum effect"], 
                c: 2, 
                e: "Both scale and astronaut fall at the same rate, removing the support force needed for a reading." 
            },
            { 
                q: "FINAL CHALLENGE: Pulling a brick on its broad side vs its narrow side. Higher friction?", 
                o: ["Narrow side (Higher pressure)", "Broad side", "Same reading", "Depends on speed"], 
                c: 2, 
                e: "Friction depends on weight and surface nature, not contact area." 
            },
            { 
                q: "FINAL CHALLENGE: Car travels constant 100km/h in a straight line. Resultant force?", 
                o: ["100 N", "Equal to engine force", "Zero", "Depends on tire size"], 
                c: 2, 
                e: "Constant speed/straight line means all forces (engine vs drag) are perfectly balanced." 
            }
        ];

        let session = [], current = 0, score = 0, timer, time = 45, lock = false, tries = 0;
        let finalCorrect = false;

        function startQuiz() {
            let shuffled = [...bigPool].sort(() => 0.5 - Math.random());
            session = shuffled.slice(0, 10);
            let finalRandom = finalChallenges[Math.floor(Math.random()*finalChallenges.length)];
            session.push(finalRandom);

            document.getElementById('scr-intro').style.display = 'none';
            document.getElementById('scr-quiz').style.display = 'block';
            setTimeout(() => { document.getElementById('scr-quiz').style.opacity = '1'; document.getElementById('scr-quiz').style.transform = 'translateY(0)'; }, 50);
            render();
        }

        function render() {
            if(current >= session.length) return end();
            lock = false; tries = 0; time = 45;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('q-num').innerText = (current === 10) ? "FINAL CHALLENGE" : `STEP ${current+1}/11`;
            document.getElementById('q-txt').innerText = session[current].q;
            const box = document.getElementById('options');
            box.innerHTML = '';
            session[current].o.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = 'btn-opt'; b.innerText = txt;
                b.onclick = () => check(i, b);
                box.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            const bar = document.getElementById('timer-bar');
            timer = setInterval(() => {
                time--;
                bar.style.width = (time/45*100) + '%';
                if(time <= 0) { clearInterval(timer); reveal(); }
            }, 1000);
        }

        function check(idx, btn) {
            if(lock) return;
            if(idx === session[current].c) {
                lock = true; clearInterval(timer);
                btn.classList.add('is-correct');
                score += (tries === 0) ? 10 : 5;
                if(current === 10) finalCorrect = true;
                document.getElementById('score-now').innerText = "PTS: " + score;
                setTimeout(() => { current++; render(); }, 1200);
            } else {
                tries++;
                btn.classList.add('is-wrong'); btn.disabled = true;
                if(tries === 1) {
                    const fb = document.getElementById('feedback');
                    fb.innerText = "HINT: Review the state of motion and force balancing.";
                    fb.style.display = 'block';
                } else {
                    lock = true; clearInterval(timer); reveal();
                }
            }
        }

        function reveal() {
            const btns = document.querySelectorAll('.btn-opt');
            btns[session[current].c].classList.add('is-correct');
            const fb = document.getElementById('feedback');
            fb.innerHTML = `<b>Correct Answer:</b> ${session[current].o[session[current].c]}<br>${session[current].e}`;
            fb.style.display = 'block';
            setTimeout(() => { current++; render(); }, 5000);
        }

        function end() {
            document.getElementById('scr-quiz').style.display = 'none';
            document.getElementById('scr-result').style.display = 'block';
            setTimeout(() => { document.getElementById('scr-result').style.opacity = '1'; document.getElementById('scr-result').style.transform = 'translateY(0)'; }, 50);
            
            document.getElementById('res-score').innerText = score + "/110";
            
            const rank = document.getElementById('res-rank');
            const desc = document.getElementById('res-desc');
            
            // Mastery Scorecard Logic based on Final Challenge Correctness
            if(finalCorrect) {
                rank.innerText = "FORCE EXPERT";
                desc.innerText = "You handled the complex Final Challenge scenarios with ease!";
            } else if(score >= 80) {
                rank.innerText = "PHYSICS PRACTITIONER";
                desc.innerText = "Solid basics! Work on your conceptual depth for the final challenges.";
            } else {
                rank.innerText = "FORCE APPRENTICE";
                desc.innerText = "Review the 'Resultant Force' section and try again.";
            }

            if(score === 110) {
                rank.innerText = "PHYSICS MASTER";
                rank.style.color = "var(--s)";
                desc.innerText = "Perfect sync! You have a deep, conceptual understanding of Grade 8 Physics.";
            }
        }
    </script>
</body>
</html>
