<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovine | G8 Physics Mastery</title>
    <style>
        :root { 
            --p: #f8fafc; --text: #1e293b; --acc: #3b82f6; 
            --s: #10b981; --e: #ef4444; --warn: #f59e0b; 
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: var(--p); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        #blueprint {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 1;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: moveGrid 30s linear infinite;
        }

        .symbol {
            position: fixed; color: rgba(59, 130, 246, 0.12); font-weight: 800; 
            font-family: serif; pointer-events: none; z-index: 2; user-select: none;
        }

        @keyframes moveGrid { from { transform: translate(0, 0); } to { transform: translate(60px, 60px); } }
        @keyframes floatSymbol { from { transform: translate(0, 0) rotate(0deg); } to { transform: translate(var(--mx), var(--my)) rotate(360deg); } }

        .card {
            width: 92%; max-width: 600px; background: var(--glass); 
            padding: 2rem; border-radius: 24px; border: 1.5px solid rgba(59, 130, 246, 0.2);
            backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center; position: relative; z-index: 100;
            display: none; opacity: 0; transform: translateY(20px);
            transition: all 0.4s ease;
        }

        #logo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s;
        }

        .btn-opt {
            display: block; width: 100%; padding: 12px 18px; margin: 8px 0;
            background: white; border: 2px solid #e2e8f0;
            border-radius: 12px; color: var(--text); cursor: pointer; text-align: left;
            transition: 0.2s; font-weight: 500; font-size: 0.95rem;
        }
        .btn-opt:hover:not(:disabled) { border-color: var(--acc); background: #f0f9ff; transform: translateX(5px); }
        .is-correct { background: var(--s) !important; color: white; border-color: var(--s); }
        .is-wrong { background: var(--e) !important; color: white; border-color: var(--e); }

        .btn-main {
            padding: 16px 40px; background: var(--acc); color: white; border: none;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 20px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        #timer-track { height: 6px; background: #e2e8f0; margin: 15px 0; border-radius: 10px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--acc); width: 100%; transition: width 1s linear; }

        #feedback { margin-top: 15px; padding: 12px; background: #fffbeb; border-radius: 10px; border-left: 5px solid var(--warn); text-align: left; font-size: 0.85rem; color: #92400e; }
    </style>
</head>
<body>

    <div id="blueprint"></div>
    <div id="symbol-container"></div>

    <div id="logo-overlay">
        <h1 style="color:#3b82f6; letter-spacing: 5px; font-weight: 900;">INNOVINE</h1>
    </div>

    <div id="scr-intro" class="card">
        <h1 style="color:var(--acc); margin-bottom: 5px;">G8 PHYSICS</h1>
        <p style="font-weight: 600; color: #64748b;">Chapter 1: Force & Weight CBQs</p>
        <div style="text-align: left; font-size: 0.85rem; background: #f1f5f9; padding: 15px; border-radius: 12px; margin: 15px 0;">
            • 10 Randomized Questions from your 20 CBQs<br>
            • 1 Final Ultimate Logic Challenge<br>
            • 45s per step | 2 Attempts Allowed
        </div>
        <button class="btn-main" onclick="startQuiz()">INITIALIZE MISSION</button>
    </div>

    <div id="scr-quiz" class="card">
        <div style="display:flex; justify-content: space-between; font-size: 0.75rem; color: var(--acc); font-weight: 800;">
            <span id="q-num">STEP 1/11</span>
            <span id="score-now">PTS: 0</span>
        </div>
        <div id="timer-track"><div id="timer-bar"></div></div>
        <h3 id="q-txt" style="text-align:left; line-height: 1.4; margin-bottom: 15px;"></h3>
        <div id="options"></div>
        <div id="feedback" style="display:none;"></div>
    </div>

    <div id="scr-result" class="card">
        <h2 style="margin: 0;">MISSION REPORT</h2>
        <div id="res-score" style="font-size:3.5rem; font-weight:900; color:var(--acc); margin: 10px 0;"></div>
        <p id="res-rank" style="font-weight: 800; color: var(--warn); margin: 5px 0;"></p>
        <button class="btn-main" onclick="location.reload()">RE-SYNC MODULE</button>
    </div>

    <script>
        // SYMBOLS BACKGROUND
        const syms = ['F', 'm', 'a', 'g', 'W', 'N', 'kg'];
        const container = document.getElementById('symbol-container');
        for(let i=0; i<15; i++) {
            const div = document.createElement('div');
            div.className = 'symbol';
            div.innerText = syms[Math.floor(Math.random()*syms.length)];
            div.style.left = Math.random()*100 + 'vw';
            div.style.top = Math.random()*100 + 'vh';
            div.style.setProperty('--mx', (Math.random()*200 - 100) + 'px');
            div.style.setProperty('--my', (Math.random()*200 - 100) + 'px');
            div.style.animation = `floatSymbol ${Math.random()*10 + 10}s linear infinite alternate`;
            container.appendChild(div);
        }

        setTimeout(() => {
            document.getElementById('logo-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('logo-overlay').style.display = 'none';
                const intro = document.getElementById('scr-intro');
                intro.style.display = 'block';
                setTimeout(() => { intro.style.opacity = '1'; intro.style.transform = 'translateY(0)'; }, 50);
            }, 800);
        }, 3000);

        // DATA POOL
        const yourPool = [
            { q: "A crane lifting a beam: Cable pulls up (12,000 N), Gravity down (11,500 N), Air resistance down (100 N). Resultant Force?", o: ["12,000 N Upward", "500 N Upward", "400 N Upward", "600 N Downward"], c: 2, e: "12,000 - (11,500 + 100) = 400 N Upward." },
            { q: "Tug-of-war: Team A pulls 2000 N. New player joins Team B; rope moves to B with 50 N resultant force. Team B's total force?", o: ["1950 N", "2050 N", "2100 N", "2000 N"], c: 1, e: "Force B - 2000 = 50, so Force B = 2050 N." },
            { q: "Person X pushes North (10 N), Person Y pushes East (10 N). Why move North-East?", o: ["North is stronger", "Forces cancel out", "Resultant of non-linear forces acts along the diagonal", "Force only works in straight lines"], c: 2, e: "Vectors add to create a diagonal resultant." },
            { q: "Car on slope: Gravity down (3000 N), Brakes up (3000 N). Child pushes downhill (10 N). Result?", o: ["Stays still", "Begins to move downhill", "Moves uphill", "Brakes increase automatically"], c: 1, e: "The forces are now unbalanced by the 10 N push." },
            { q: "In which case is the Resultant Force zero?", o: ["Ball falling", "Car turning corner", "Book resting on table", "Rocket taking off"], c: 2, e: "Resting objects have balanced forces." },
            { q: "Skydiver parachute 'jerk' caused by air hitting fabric. Classification?", o: ["Contact Force (Air Resistance)", "Non-contact Force (Gravity)", "Magnetic Force", "Electrostatic Force"], c: 0, e: "Physical contact with air particles." },
            { q: "Rubbed comb attracts paper bits without touch. Example of:", o: ["Muscular Force", "Magnetic Force", "Non-contact Force (Electrostatic)", "Frictional Force"], c: 2, e: "Action at a distance via electric field." },
            { q: "Magnetic crane lifts car before touching it. This proves:", o: ["Magnetic is contact", "Magnetic is Non-contact", "Car is alive", "Gravity stopped"], c: 1, e: "Field forces do not require physical touch." },
            { q: "Which activity depends ENTIRELY on Muscular Force?", o: ["Magnet pulling needle", "Apple falling", "Weightlifter holding barbell", "Scale attracting hair"], c: 2, e: "Requires biological muscle contraction." },
            { q: "Rolling ball eventually stops. Which two forces were acting?", o: ["Magnetic and Electrostatic", "Gravity (Non-contact) and Friction (Contact)", "Muscular and Magnetic", "Only Gravity"], c: 1, e: "Weight and surface resistance." },
            { q: "Rover mass 120 kg on Earth. Mass on Moon (1/6th gravity)?", o: ["20 kg", "120 kg", "720 kg", "0 kg"], c: 1, e: "Mass is constant regardless of location." },
            { q: "Bag of flour mass 5 kg. Approximate weight on Earth (g=10)?", o: ["5 N", "0.5 N", "50 N", "500 N"], c: 2, e: "Weight = 5kg * 10N/kg = 50 N." },
            { q: "Planet X has double Earth's gravity. Weight 500 N on Earth becomes:", o: ["250 N", "500 N", "1000 N", "100 N"], c: 2, e: "Weight is proportional to gravity (W=mg)." },
            { q: "Which instrument gives the SAME reading on Jupiter as on Earth?", o: ["Spring Balance", "Beam Balance", "Weighing Scale", "All of the above"], c: 1, e: "Beam balance compares two masses." },
            { q: "In a falling elevator (broken cable), why feel 'weightless'?", o: ["No gravity", "Zero mass", "No contact force from floor to oppose gravity", "Too fast for gravity"], c: 2, e: "Reaction force becomes zero." },
            { q: "Spring balance measures 10 N. Spring snaps. Pointer shows:", o: ["0 N", "10 N", "Max reading", "5 N"], c: 0, e: "No tension means no measurement." },
            { q: "Sponge changes shape under force, brick doesn't. This shows:", o: ["Force only on sponge", "Rigidity affects shape change", "Brick has no mass", "Force ignores solids"], c: 1, e: "Material properties determine deformation." },
            { q: "Batsman hits cricket ball. Ball flies to boundary. Most prominent effect?", o: ["Change in mass", "Change in direction of motion", "Change in shape", "Rest to motion"], c: 1, e: "The ball's velocity vector is redirected." },
            { q: "Toy car (2 m/s) pushed in opposite direction. Result?", o: ["Speed decreases", "Speed increases", "Mass increases", "Non-contact force"], c: 0, e: "Opposing force causes deceleration." },
            { q: "Why more force to move iron ball than plastic ball?", o: ["Iron is magnetic", "Inertia/Force depends on mass", "Plastic has no gravity", "Friction only on iron"], c: 1, e: "Higher mass requires more force to change motion." }
        ];

        const finalLogic = [
            { q: "FINAL: Balanced tug-of-war. Both sides pull twice as hard. Result?", o: ["Moves to B", "Zero resultant, higher tension", "Resultant doubles", "Rope breaks"], c: 1, e: "Net force remains zero." },
            { q: "FINAL: Astronaut floats in ISS (90% gravity). Scale shows 0N. Why?", o: ["No gravity", "Free Fall state", "Vacuum", "ISS speed"], c: 1, e: "No support force to create a reading." },
            { q: "FINAL: Brick pulled on broad side vs narrow side. Friction?", o: ["Narrow higher", "Broad higher", "Same reading", "Area dependent"], c: 2, e: "Friction is independent of contact area." },
            { q: "FINAL: Car at constant 100 km/h in straight line. Resultant?", o: ["100 N", "Engine force", "Zero", "Friction total"], c: 2, e: "Zero acceleration = Zero net force." }
        ];

        let session = [], current = 0, score = 0, timer, time = 45, lock = false, tries = 0;

        function startQuiz() {
            let shuffled = [...yourPool].sort(() => 0.5 - Math.random()).slice(0, 10);
            let final = finalLogic[Math.floor(Math.random() * finalLogic.length)];
            session = [...shuffled, final];
            document.getElementById('scr-intro').style.display = 'none';
            document.getElementById('scr-quiz').style.display = 'block';
            render();
        }

        function render() {
            if(current >= session.length) return end();
            lock = false; tries = 0; time = 45;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('q-num').innerText = (current === 10) ? "FINAL CHALLENGE" : `STEP ${current+1}/11`;
            document.getElementById('q-txt').innerText = session[current].q;
            const box = document.getElementById('options');
            box.innerHTML = '';
            session[current].o.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = 'btn-opt'; b.innerText = txt;
                b.onclick = () => check(i, b);
                box.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            const bar = document.getElementById('timer-bar');
            timer = setInterval(() => {
                time--;
                bar.style.width = (time/45*100) + '%';
                if(time <= 0) { clearInterval(timer); reveal(); }
            }, 1000);
        }

        function check(idx, btn) {
            if(lock) return;
            if(idx === session[current].c) {
                lock = true; clearInterval(timer);
                btn.classList.add('is-correct');
                score += (tries === 0) ? 10 : 5;
                document.getElementById('score-now').innerText = "PTS: " + score;
                setTimeout(() => { current++; render(); }, 1200);
            } else {
                tries++;
                btn.classList.add('is-wrong'); btn.disabled = true;
                if(tries === 1) {
                    const fb = document.getElementById('feedback');
                    fb.innerText = "HINT: Re-calculate the net force or check if mass/weight properties apply.";
                    fb.style.display = 'block';
                } else {
                    lock = true; clearInterval(timer); reveal();
                }
            }
        }

        function reveal() {
            const btns = document.querySelectorAll('.btn-opt');
            btns[session[current].c].classList.add('is-correct');
            const fb = document.getElementById('feedback');
            fb.innerHTML = `<b>Logic:</b> ${session[current].e}`;
            fb.style.display = 'block';
            setTimeout(() => { current++; render(); }, 4000);
        }

        function end() {
            document.getElementById('scr-quiz').style.display = 'none';
            document.getElementById('scr-result').style.display = 'block';
            document.getElementById('res-score').innerText = score + "/110";
            document.getElementById('res-rank').innerText = score >= 100 ? "PHYSICS MASTER" : score >= 60 ? "PRACTITIONER" : "APPRENTICE";
        }
    </script>
</body>
</html>
