<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G8 Physics | Force Mastery</title>
    <style>
        :root { 
            --p: #f8fafc; --text: #1e293b; --acc: #3b82f6; 
            --s: #10b981; --e: #ef4444; --warn: #f59e0b; 
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: var(--p); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        #blueprint {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 1;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: moveGrid 30s linear infinite;
        }

        .symbol {
            position: fixed; color: rgba(59, 130, 246, 0.12); font-weight: 800; 
            font-family: serif; pointer-events: none; z-index: 2; user-select: none;
        }

        @keyframes moveGrid { from { transform: translate(0, 0); } to { transform: translate(60px, 60px); } }
        @keyframes floatSymbol { from { transform: translate(0, 0) rotate(0deg); } to { transform: translate(var(--mx), var(--my)) rotate(360deg); } }

        .card {
            width: 92%; max-width: 600px; background: var(--glass); 
            padding: 2rem; border-radius: 24px; border: 1.5px solid rgba(59, 130, 246, 0.2);
            backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center; position: relative; z-index: 100;
            display: none; opacity: 0; transform: translateY(20px);
            transition: all 0.4s ease;
        }

        #logo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s;
        }

        .btn-opt {
            display: block; width: 100%; padding: 12px 18px; margin: 8px 0;
            background: white; border: 2px solid #e2e8f0;
            border-radius: 12px; color: var(--text); cursor: pointer; text-align: left;
            transition: 0.2s; font-weight: 500; font-size: 0.95rem;
        }
        .btn-opt:hover:not(:disabled) { border-color: var(--acc); background: #f0f9ff; transform: translateX(5px); }
        .is-correct { background: var(--s) !important; color: white; border-color: var(--s); }
        .is-wrong { background: var(--e) !important; color: white; border-color: var(--e); }

        .btn-main {
            padding: 16px 40px; background: var(--acc); color: white; border: none;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 20px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        #timer-track { height: 6px; background: #e2e8f0; margin: 15px 0; border-radius: 10px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--acc); width: 100%; transition: width 1s linear; }

        #feedback { margin-top: 15px; padding: 12px; background: #fffbeb; border-radius: 10px; border-left: 5px solid var(--warn); text-align: left; font-size: 0.85rem; color: #92400e; }

        @media (max-width: 600px) { .card { padding: 1.2rem; } h3 { font-size: 1rem; } .btn-opt { font-size: 0.85rem; padding: 10px; } }
    </style>
</head>
<body>

    <div id="blueprint"></div>
    <div id="symbol-container"></div>

    <div id="logo-overlay">
        <img src="assets/logo.png" alt="Innovine" style="width: 200px;" onerror="this.style.display='none'">
    </div>

    <div id="scr-intro" class="card">
        <h1 style="color:var(--acc); margin-bottom: 5px;">CBSE PHYSICS</h1>
        <p style="font-weight: 600; color: #64748b;">Force & Pressure: Grade 8 CBQ</p>
        <div style="text-align: left; font-size: 0.85rem; background: #f1f5f9; padding: 15px; border-radius: 12px; margin: 15px 0;">
            • 10 Questions from your provided pool<br>
            • 1 Random Final Logic Challenge<br>
            • Mastery Scorecard Evaluation
        </div>
        <button class="btn-main" onclick="startQuiz()">INITIALIZE</button>
    </div>

    <div id="scr-quiz" class="card">
        <div style="display:flex; justify-content: space-between; font-size: 0.75rem; color: var(--acc); font-weight: 800;">
            <span id="q-num">STEP 1/11</span>
            <span id="score-now">PTS: 0</span>
        </div>
        <div id="timer-track"><div id="timer-bar"></div></div>
        <h3 id="q-txt" style="text-align:left; line-height: 1.4; margin-bottom: 15px;"></h3>
        <div id="options"></div>
        <div id="feedback" style="display:none;"></div>
    </div>

    <div id="scr-result" class="card">
        <h2 style="margin: 0;">REPORT GENERATED</h2>
        <div id="res-score" style="font-size:3.5rem; font-weight:900; color:var(--acc); margin: 10px 0;"></div>
        <p id="res-rank" style="font-weight: 800; color: var(--warn); margin: 5px 0;"></p>
        <p id="res-desc" style="margin-bottom: 20px; color: #64748b; font-size: 0.9rem;"></p>
        <button class="btn-main" onclick="location.reload()">RE-SYNC SYSTEM</button>
    </div>

    <script>
        // SYMBOLS
        const syms = ['F=ma', 'v=d/t', 'G', 'ΣF', 'm', 'a', 'W=mg', 'N', 'kg', 'Δ'];
        const container = document.getElementById('symbol-container');
        for(let i=0; i<20; i++) {
            const div = document.createElement('div');
            div.className = 'symbol';
            div.innerText = syms[Math.floor(Math.random()*syms.length)];
            div.style.left = Math.random()*100 + 'vw';
            div.style.top = Math.random()*100 + 'vh';
            div.style.setProperty('--mx', (Math.random()*300 - 150) + 'px');
            div.style.setProperty('--my', (Math.random()*300 - 150) + 'px');
            div.style.animation = `floatSymbol ${Math.random()*15 + 10}s linear infinite alternate`;
            container.appendChild(div);
        }

        setTimeout(() => {
            const overlay = document.getElementById('logo-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                const intro = document.getElementById('scr-intro');
                intro.style.display = 'block';
                setTimeout(() => { intro.style.opacity = '1'; intro.style.transform = 'translateY(0)'; }, 50);
            }, 800);
        }, 5000);

        // THE 30 QUESTION POOL (EXACT WORDING)
        const bigPool = [
            { q: "Two identical toy cars, A and B, are pushed on a smooth floor. Car A is pushed with a force of 5 N to the right. Car B is pushed with 10 N to the right and 5 N to the left. Which statement is correct?", o: ["Car A moves faster because it has only one force.", "Car B moves slower because forces are pulling it back.", "Both cars move with the same resultant force (5 N to the right).", "Car B stays stationary because the forces cancel out."], c: 2, e: "Net force on B = 10N - 5N = 5N to the right." },
            { q: "A block is acted upon by three forces: F1 = 10 N (North), F2 = 10 N (South), and F3 = 5 N (West). In which direction will the block move?", o: ["North", "South", "West", "It will not move at all."], c: 2, e: "Vertical forces cancel each other; only Westward force remains." },
            { q: "A rocket is moving upward through the atmosphere. If the upward thrust (force) is exactly equal to the downward force of gravity and air resistance combined, the rocket will:", o: ["Fall back to Earth.", "Stop mid-air.", "Continue moving upward at a constant speed.", "Accelerate faster and faster."], c: 2, e: "Balanced forces result in a constant state of motion (Uniform Motion)." },
            { q: "A heavy crate requires 50 N of force to start sliding. If two people pull it in the same direction with 20 N and 25 N respectively, will the crate move?", o: ["Yes, because 45 N is a large force.", "No, because the resultant force (45 N) is less than the required force (50 N).", "Yes, because any force causes motion.", "No, because the forces must be equal."], c: 1, e: "The total applied force must overcome the threshold of static friction." },
            { q: "A student says, 'Force can only move an object that is at rest.' Why is this wrong?", o: ["Force can only stop objects.", "Force can only change the shape.", "Force can also change the speed or direction of an object already in motion.", "Force has no effect on stationary objects."], c: 2, e: "Force is defined as a push or pull that can change speed, direction, or shape." },
            { q: "A person is skydiving. Before the parachute opens, the person experiences a downward pull and an upward 'drag.' Classify these forces.", o: ["Both are contact forces.", "Both are non-contact forces.", "Downward (Gravity) is non-contact; Upward (Air resistance) is contact.", "Downward (Gravity) is contact; Upward (Air resistance) is non-contact."], c: 2, e: "Gravity acts at a distance; Air resistance requires contact with air particles." },
            { q: "Why is 'Magnetic Force' considered a non-contact force?", o: ["Because magnets are made of metal.", "Because it can attract or repel objects without physical touch.", "Because it only works in a vacuum.", "Because it is stronger than friction."], c: 1, e: "Non-contact forces act through fields without physical interaction." },
            { q: "Which of the following is NOT an example of a contact force?", o: ["Muscular force used to lift a bag.", "Frictional force stopping a rolling ball.", "Electrostatic force attracting hair to a comb.", "Tension in a rope during tug-of-war."], c: 2, e: "Electrostatic force acts over a distance without touching." },
            { q: "When we walk on the ground, which contact force prevents us from slipping?", o: ["Gravitational force", "Muscular force", "Frictional force", "Electrostatic force"], c: 2, e: "Friction provides the necessary traction for movement." },
            { q: "A dry plastic scale is rubbed with silk and brought near a neutral copper wire. No attraction is observed. Why?", o: ["Copper is not magnetic.", "Metals allow the charge to flow away; electrostatic attraction is best seen with insulators like paper.", "Silk removes the force.", "The scale was not rubbed hard enough."], c: 1, e: "Conductors like copper dissipate static charges immediately." },
            { q: "An object has a mass of 12 kg on Earth. What is its weight on Earth? (Take g = 10 N/kg)", o: ["1.2 N", "12 N", "120 N", "120 kg"], c: 2, e: "Weight = m * g = 12 kg * 10 N/kg = 120 N." },
            { q: "An object is taken from Earth to the Moon. Which instrument will show a different reading on the Moon compared to Earth?", o: ["A beam balance (measures mass).", "A spring balance (measures weight).", "A ruler (measures length).", "A digital stopwatch (measures time)."], c: 1, e: "Weight depends on the local gravitational pull." },
            { q: "If you go to a planet where gravity is double that of Earth's, your:", o: ["Mass will double, Weight stays same.", "Mass stays same, Weight stays same.", "Mass stays same, Weight will double.", "Mass will double, Weight will double."], c: 2, e: "Mass is an intrinsic property; Weight is m*g." },
            { q: "A spring balance is used to measure the weight of a stone. If the same stone is submerged in water while still hanging from the balance, the reading will:", o: ["Decrease (due to upward buoyant force).", "Increase.", "Stay the same.", "Become zero."], c: 0, e: "The buoyant force of the water pushes the stone upward." },
            { q: "Why is Weight measured in 'Newtons' and not 'Kilograms'?", o: ["Because Weight is a type of speed.", "Because Weight is a force exerted by gravity.", "Because Kilograms are only for liquids.", "Because Newton discovered the Moon."], c: 1, e: "Newton is the standard unit for any force, including gravity." },
            { q: "A baker is pressing down on a ball of dough. What is the primary effect of the force applied?", o: ["Change in speed.", "Change in direction of motion.", "Change in shape and size.", "Change in mass."], c: 2, e: "Force applied to non-rigid bodies causes deformation." },
            { q: "A goalkeeper catches a fast-moving football and brings it to rest. Which effect of force is demonstrated?", o: ["Changing the state of motion (from motion to rest).", "Changing the direction of motion.", "Changing the mass of the ball.", "Applying non-contact force."], c: 0, e: "Force is used to stop the ball's motion." },
            { q: "A magnet is held near a compass. The needle of the compass deflects. This shows that force can:", o: ["Change the shape of the needle.", "Change the direction of motion.", "Increase the weight of the needle.", "Stop the needle from vibrating."], c: 1, e: "The magnetic force changes the orientation of the needle." },
            { q: "You apply a force to a heavy wall, but the wall does not move. Which statement is true?", o: ["No force was applied.", "The wall has no mass.", "The force was not enough to overcome the inertia/friction of the wall.", "Force only works on small objects."], c: 2, e: "If the resultant force is not enough to overcome resistance, no motion occurs." },
            { q: "If you apply the same amount of force to a tennis ball and a bowling ball, which one will have a greater change in speed?", o: ["The tennis ball (because it has less mass).", "The bowling ball (because it is larger).", "Both will have the same change.", "Neither will move."], c: 0, e: "F=ma; less mass results in greater acceleration for the same force." },
            { q: "Two teams are pulling a rope. Team A pulls with 1500 N of force. Team B pulls with 1550 N. A player on Team B trips and stops pulling, which reduces their team's force by 100 N. What happens to the rope?", o: ["It moves towards Team B with a force of 50 N.", "It remains stationary.", "It moves towards Team A with a net force of 50 N.", "It moves towards Team A with a net force of 100 N."], c: 2, e: "Team B's new force = 1450N. Resultant = 1500 - 1450 = 50N towards A." },
            { q: "A football is rolling at a constant speed across a field. A player kicks it in a direction exactly perpendicular (at a 90° angle) to its current path. How does the ball's motion change?", o: ["It continues in the same direction but faster.", "It stops moving immediately.", "Its direction changes, but its speed magnitude remains the same initially.", "It moves backward toward the player."], c: 2, e: "A force perpendicular to motion changes only the direction." },
            { q: "An astronaut has a mass of 60 kg on Earth. If the gravity on the Moon is 1/6th of the gravity on Earth, what will be the astronaut's mass on the Moon?", o: ["10 kg", "360 kg", "60 kg", "0 kg"], c: 2, e: "Mass remains constant regardless of the gravitational environment." },
            { q: "Two identical spring balances are connected in a vertical line (series). A 10 N weight is hung from the bottom balance. What will the top balance read?", o: ["5 N", "10 N", "20 N", "0 N"], c: 1, e: "In a series connection, the tension is the same throughout the line." },
            { q: "A plastic scale is rubbed against a woolen sweater and held near small bits of paper. The paper bits 'jump' to the scale. This demonstrates:", o: ["Magnetic force can be created by plastic.", "Electrostatic force acts from a distance without contact.", "Muscular force is transferred to the paper.", "Friction is pulling the paper bits."], c: 1, e: "The scale is charged, attracting the paper through electrostatic force." },
            { q: "A student says, 'If the resultant force on an object is Zero, it means the object cannot be moving.' Why is this statement incorrect?", o: ["Objects always move regardless of force.", "If net force is zero, an object can still be moving at a constant speed in a straight line.", "A zero net force causes objects to speed up.", "Net force can never be zero because of gravity."], c: 1, e: "Zero resultant force means zero acceleration, not necessarily zero velocity." },
            { q: "You are trying to stop a heavy trolley moving toward you. In which direction must you apply the force relative to the trolley’s motion?", o: ["At a 90° angle to the trolley.", "In the same direction the trolley is moving.", "In the opposite direction of the trolley’s motion.", "Downward toward the ground."], c: 2, e: "Force must oppose motion to cause a decrease in speed." },
            { q: "Which of the following scenarios describes 'Balanced Forces'?", o: ["A car speeding up to overtake a bus.", "A heavy book lying still on a table.", "A ball falling from a height.", "A plane taking off from a runway."], c: 1, e: "When forces are balanced, the object remains at rest or moves at a constant speed." },
            { q: "Why does a baker apply force to a piece of dough?", o: ["To change its state of motion.", "To increase its mass.", "To change its shape and size.", "To increase the force of gravity on it."], c: 2, e: "Deformation is a primary effect of force on non-rigid objects." },
            { q: "An object weighs 120 N on Earth (g = 10 m/s^2). On Planet X, the gravity is 5 m/s^2. What is the weight of the object on Planet X?", o: ["60 N", "120 N", "24 N", "240 N"], c: 0, e: "Mass = 12kg. Weight on Planet X = 12 kg * 5 m/s^2 = 60 N." }
        ];

        // THE 4 FINAL CHALLENGES
        const finalChallenges = [
            { 
                q: "FINAL CHALLENGE 1: Team A and Team B are in a perfectly balanced tug-of-war. The rope is not moving. Suddenly, both teams decide to pull twice as hard at the exact same moment. What happens to the Resultant Force and Tension?", 
                o: ["Resultant doubles, Tension stays same", "Resultant stays Zero, Tension increases", "Resultant decreases, Tension increases", "Both stay exactly the same"], 
                c: 1, 
                e: "The Resultant Force remains Zero because the increases cancel out, but internal Tension increases significantly." 
            },
            { 
                q: "FINAL CHALLENGE 2: An astronaut inside the ISS appears to float and a spring balance shows 0 N, even though gravity is 90% of Earth's value. Why?", 
                o: ["No gravity in orbit", "Moving at the speed of light", "The astronaut and ISS are in a state of Free Fall", "The scale is broken in space"], 
                c: 2, 
                e: "Free Fall means both the scale and astronaut fall together, so there's no support force to compress the spring." 
            },
            { 
                q: "FINAL CHALLENGE 3: A rectangular brick is pulled on its broad side, then flipped to its narrow side and pulled again at the same speed. Does friction change?", 
                o: ["Yes, narrow side has higher friction", "Yes, broad side has higher friction", "No, the reading will be the same", "Depends on the air pressure"], 
                c: 2, 
                e: "Friction is independent of contact area; it only depends on the nature of the surfaces and the weight." 
            },
            { 
                q: "FINAL CHALLENGE 4: A car is traveling down a highway at a perfectly constant speed of 100 km/h in a straight line. The Resultant Force is:", 
                o: ["100 N", "Equal to the engine's force", "Zero", "Equal to the air resistance only"], 
                c: 2, 
                e: "If velocity is constant, the resultant force must be zero (Engine force = Friction + Air resistance)." 
            }
        ];

        let session = [], current = 0, score = 0, timer, time = 45, lock = false, tries = 0;
        let finalCorrect = false;

        function startQuiz() {
            // Pick 10 random questions from the core pool
            let shuffledCore = [...bigPool].sort(() => 0.5 - Math.random());
            session = shuffledCore.slice(0, 10);
            
            // Pick 1 random final challenge
            let shuffledFinal = [...finalChallenges].sort(() => 0.5 - Math.random());
            session.push(shuffledFinal[0]);

            document.getElementById('scr-intro').style.display = 'none';
            document.getElementById('scr-quiz').style.display = 'block';
            setTimeout(() => { 
                document.getElementById('scr-quiz').style.opacity = '1'; 
                document.getElementById('scr-quiz').style.transform = 'translateY(0)'; 
            }, 50);
            render();
        }

        function render() {
            if(current >= session.length) return end();
            lock = false; tries = 0; time = 45;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('q-num').innerText = (current === 10) ? "FINAL CHALLENGE" : `STEP ${current+1}/11`;
            document.getElementById('q-txt').innerText = session[current].q;
            const box = document.getElementById('options');
            box.innerHTML = '';
            session[current].o.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = 'btn-opt'; b.innerText = txt;
                b.onclick = () => check(i, b);
                box.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            const bar = document.getElementById('timer-bar');
            timer = setInterval(() => {
                time--;
                bar.style.width = (time/45*100) + '%';
                if(time <= 0) { clearInterval(timer); reveal(); }
            }, 1000);
        }

        function check(idx, btn) {
            if(lock) return;
            if(idx === session[current].c) {
                lock = true; clearInterval(timer);
                btn.classList.add('is-correct');
                score += (tries === 0) ? 10 : 5;
                if(current === 10) finalCorrect = true;
                document.getElementById('score-now').innerText = "PTS: " + score;
                setTimeout(() => { current++; render(); }, 1500);
            } else {
                tries++;
                btn.classList.add('is-wrong'); btn.disabled = true;
                if(tries === 1) {
                    const fb = document.getElementById('feedback');
                    fb.innerText = "HINT: Sensors indicate a conceptual mismatch. Re-evaluate the forces acting in this scenario.";
                    fb.style.display = 'block';
                } else {
                    lock = true; clearInterval(timer); reveal();
                }
            }
        }

        function reveal() {
            const btns = document.querySelectorAll('.btn-opt');
            btns[session[current].c].classList.add('is-correct');
            const fb = document.getElementById('feedback');
            fb.innerHTML = `<b>EXPLANATION:</b> ${session[current].e}`;
            fb.style.display = 'block';
            setTimeout(() => { current++; render(); }, 5000);
        }

        function end() {
            document.getElementById('scr-quiz').style.display = 'none';
            document.getElementById('scr-result').style.display = 'block';
            setTimeout(() => { 
                document.getElementById('scr-result').style.opacity = '1'; 
                document.getElementById('scr-result').style.transform = 'translateY(0)'; 
            }, 50);
            
            document.getElementById('res-score').innerText = score + "/110";
            const rank = document.getElementById('res-rank');
            const desc = document.getElementById('res-desc');
            
            // Mastery Scorecard Logic based on YOUR requirements
            if(score === 110) {
                rank.innerText = "PHYSICS MASTER";
                desc.innerText = "You have a deep, conceptual understanding of Grade 8 Physics!";
            } else if(finalCorrect) {
                rank.innerText = "FORCE EXPERT";
                desc.innerText = "You can handle complex scenarios well!";
            } else if(score >= 60) {
                rank.innerText = "PHYSICS PRACTITIONER";
                desc.innerText = "You have a good handle on the basics.";
            } else {
                rank.innerText = "FORCE APPRENTICE";
                desc.innerText = "Go back and review the 'Resultant Force' section.";
            }
        }
    </script>
</body>
</html>
