<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovine | Force Mastery Quiz</title>
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --success: #059669;
            --error: #dc2626; --bg: #f8fafc;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        #blueprint-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background-color: #f1f5f9;
            background-image: linear-gradient(#e2e8f0 1.5px, transparent 1.5px), linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 40px 40px; pointer-events: none;
        }

        #logo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s ease;
        }
        #logo-overlay img { width: 200px; height: auto; }

        .card {
            width: 92%; max-width: 550px; background: white;
            padding: 35px; border-radius: 24px; border: 1px solid #e2e8f0;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center; position: relative; z-index: 100;
        }
        .hidden { display: none !important; }

        .header-box { display: flex; justify-content: space-between; font-weight: 800; color: var(--accent); margin-bottom: 15px; font-size: 0.8rem; letter-spacing: 1.2px; }
        .timer-track { height: 5px; background: #f1f5f9; border-radius: 10px; margin-bottom: 25px; overflow: hidden; border: 1px solid #e2e8f0; }
        #timer-bar { height: 100%; background: var(--accent); width: 100%; transition: width 1s linear; }

        .q-tag { display: inline-block; padding: 4px 14px; border-radius: 8px; background: #eff6ff; color: var(--accent); font-size: 0.7rem; font-weight: 800; margin-bottom: 15px; border: 1px solid #dbeafe; text-transform: uppercase; }
        .q-text { font-size: 1.1rem; font-weight: 700; text-align: left; line-height: 1.5; margin-bottom: 25px; color: #1e293b; }

        .options-grid { display: grid; gap: 12px; }
        .btn-opt {
            padding: 16px; border: 2px solid #f1f5f9; border-radius: 14px;
            background: white; cursor: pointer; transition: 0.2s;
            font-size: 0.95rem; text-align: left; font-weight: 600; color: #475569;
        }
        .btn-opt:hover:not(:disabled) { border-color: var(--accent); background: #f8fafc; }
        .is-correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .is-wrong { background: var(--error) !important; color: white !important; border-color: var(--error) !important; }

        .btn-prime {
            padding: 18px 50px; background: var(--accent); color: white; border: none;
            border-radius: 16px; font-size: 1rem; cursor: pointer; font-weight: 800;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        #feedback-box { margin-top: 25px; padding: 18px; background: #fffbeb; border-radius: 14px; border-left: 5px solid #f59e0b; text-align: left; font-size: 0.9rem; line-height: 1.6; color: #92400e; }
        .sparkle { position: absolute; pointer-events: none; animation: fly 0.8s forwards; font-size: 20px; color: #facc15; z-index: 200; }
        @keyframes fly { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-80px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="blueprint-bg"></div>

    <div id="logo-overlay">
        <img src="assets/logo.png" alt="Innovine" onerror="this.style.display='none'">
    </div>

    <div id="scr-intro" class="card">
        <h1 style="color:var(--accent); font-size: 1.8rem; margin-bottom: 10px;">FORCE & MOTION</h1>
        <p style="color: #64748b; font-weight: 600; margin-bottom: 25px;">Physics Competency Assessment</p>
        <div style="text-align: left; background: #f8fafc; padding: 20px; border-radius: 16px; margin-bottom: 30px; font-size: 0.85rem; color: #475569;">
            <p>• 10 Randomized Questions on Force Mechanics</p>
            <p>• 1 Final Master Challenge</p>
            <p>• Time limit: 45s per task</p>
        </div>
        <button class="btn-prime" onclick="initQuiz()">Start Simulation</button>
    </div>

    <div id="scr-quiz" class="card hidden">
        <div class="header-box">
            <span id="q-number-display">TASK 01/11</span>
            <span id="score-display">PTS: 0</span>
        </div>
        <div class="timer-track"><div id="timer-bar"></div></div>
        <div id="q-category" class="q-tag">DYNAMICS</div>
        <div id="q-txt" class="q-text"></div>
        <div id="options-box" class="options-grid"></div>
        <div id="feedback-box" class="hidden"></div>
    </div>

    <div id="scr-result" class="card hidden">
        <h2 id="res-title">Mission Complete</h2>
        <p id="res-score" style="font-size:3.5rem; font-weight:900; margin:15px 0; color:var(--accent);"></p>
        <p id="res-desc" style="color:#64748b; line-height:1.6; margin-bottom:30px; font-weight: 500;"></p>
        <button class="btn-prime" onclick="location.reload()">New Session</button>
    </div>

    <script>
        // Strictly Force Questions from your 20-pool
        const corePool = [
            { q: "A potter applies a constant inward squeeze with his hands while the clay spins. Which effect of force is he utilizing?", o: ["Changing only speed", "Stopping motion", "Changing shape and size", "Only changing direction"], c: 2, e: "Force changes the dimensions and shape of soft objects like clay." },
            { q: "A football rolls slowly. A player kicks it in the same direction it is moving. Result?", o: ["Sudden stop", "180° direction change", "Speed increases", "Mass changes"], c: 2, e: "A force applied in the direction of motion causes acceleration (speeding up)." },
            { q: "Why is the note 'Stationary objects move on their own if they have energy' incorrect?", o: ["They have no energy", "Force is required to start motion", "Only living things move alone", "Chair is too heavy"], c: 1, e: "Newton's laws state an external force is required to change a state of rest." },
            { q: "You push a heavy cupboard but it doesn't move. Why?", o: ["No force applied", "Wrong direction", "Effort not enough to overcome inertia", "Force only works on moving things"], c: 2, e: "If the applied force doesn't exceed the resisting forces (like static friction), motion won't start." },
            { q: "In physics, what does the 'N' stand for in '50 N'?", o: ["Net Force", "Nominal", "Newton", "Natural"], c: 2, e: "Newton is the standard unit of Force." },
            { q: "Arka pushes 40 N right. Diya pushes 40 N left from the other side. Resultant force?", o: ["0 N", "80 N Right", "40 N Upward", "80 N Left"], c: 0, e: "Equal and opposite forces cancel out, resulting in zero net force." },
            { q: "String A pulls North with 10 N; String B pulls North with 15 N. Total resultant force?", o: ["5 N North", "5 N South", "25 N North", "150 N North"], c: 2, e: "Forces acting in the same direction are added together." },
            { q: "An object moves at constant speed in a straight line. The resultant force is:", o: ["Zero", "Large in direction of motion", "Pulling backward", "Non-existent"], c: 0, e: "Constant velocity means forces are balanced; therefore, the resultant is zero." },
            { q: "A resultant force of 10 N acts East on a ball. Where will it move?", o: ["West", "East", "North", "Stay still"], c: 1, e: "Objects always move/accelerate in the direction of the net force." },
            { q: "Group applies 100 N to a stone. Friction is 100 N in the opposite direction. Will it move?", o: ["Yes", "No, resultant is zero", "Yes, friction is weak", "No, friction is always stronger"], c: 1, e: "When applied force equals frictional force, the net force is zero and no motion starts." },
            { q: "Which of the following is an example of a non-contact force?", o: ["Pushing a trolley", "Catching a ball", "Magnet attracting nails", "Kicking a stone"], c: 2, e: "Magnetic forces act through a field without physical contact." },
            { q: "Why is 'Muscular Force' a contact force?", o: ["Muscles are inside", "Requires physical touch", "It is very strong", "Acts through vacuum"], c: 1, e: "Muscular force is only exerted when the body is touching the object." },
            { q: "A rubbed plastic scale attracts bits of paper. This is:", o: ["Magnetic", "Electrostatic", "Frictional", "Gravitational"], c: 1, e: "Friction transfers electrons, creating an electrostatic pull." },
            { q: "An apple falls to the ground because of:", o: ["Muscular force", "Air contact", "Non-contact Gravitational force", "Magnetic pull"], c: 2, e: "Gravity is a non-contact force that pulls objects toward Earth's center." },
            { q: "Which force causes the wear and tear of shoe soles?", o: ["Electrostatic", "Gravitational", "Frictional", "Magnetic"], c: 2, e: "Friction between surfaces causes mechanical wear over time." },
            { q: "An astronaut travels to the Moon. Which stays exactly the same?", o: ["Weight", "Mass", "Gravity", "Reading on spring balance"], c: 1, e: "Mass is the quantity of matter; it does not change with location." },
            { q: "If a bag has a mass of 10 kg, what is its weight on Earth? (g=10)", o: ["1 N", "10 N", "100 N", "0 N"], c: 2, e: "Weight = Mass x Gravity = 10 x 10 = 100 N." },
            { q: "A spring balance is used to measure:", o: ["Only Mass", "Force (Weight)", "Volume", "Speed"], c: 1, e: "Spring balances measure the force exerted on the spring (Weight)." },
            { q: "Why does a spring stretch when a block is hung on it?", o: ["Block is magnetic", "Gravity pulls it down", "Air pressure", "Mass increases"], c: 1, e: "The weight of the block pulls the spring downward, causing extension." },
            { q: "Why is weight different on the Moon?", o: ["Moon's gravity is weaker", "No air", "Mass is lost", "Moon is far from Sun"], c: 0, e: "Weight depends on the gravitational pull of the planet/satellite." }
        ];

        const finalPool = [
            { q: "If two identical spring balances are connected in a line (series) and a 5 kg weight is hung from the bottom, the top balance reads:", o: ["2.5 kg", "5 kg", "0 kg", "10 kg"], c: 1, e: "Tension is equal throughout a series connection; both show 5kg." },
            { q: "A 2kg toy car is pulled left with 10N and right with 10N. A third force of 2N is added to the right. The resultant is:", o: ["22 N right", "0 N", "2 N right", "2 N left"], c: 2, e: "10N left and right cancel out (0N), leaving only the new 2N right force." },
            { q: "A metal sphere stops and dents a clay block. Which effect of force is NOT present?", o: ["Change in speed", "Change in shape", "Change in mass", "Contact force"], c: 2, e: "Force can never change the mass of an object." }
        ];

        let quizSet = [], currentIdx = 0, score = 0, timer, timeLeft = 45, tries = 0, locked = false;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('logo-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('logo-overlay').style.display = 'none', 800);
            }, 3000);
        };

        function initQuiz() {
            const shuffledCore = [...corePool].sort(() => 0.5 - Math.random()).slice(0, 10);
            const shuffledFinal = [...finalPool].sort(() => 0.5 - Math.random()).slice(0, 1);
            quizSet = [...shuffledCore, ...shuffledFinal];
            
            document.getElementById('scr-intro').classList.add('hidden');
            document.getElementById('scr-quiz').classList.remove('hidden');
            render();
        }

        function render() {
            if(currentIdx >= quizSet.length) return end();
            locked = false; tries = 0; timeLeft = 45;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('q-number-display').innerText = `TASK ${currentIdx + 1}/11`;
            
            const q = quizSet[currentIdx];
            document.getElementById('q-category').innerText = currentIdx === 10 ? "FINAL CHALLENGE" : "FORCE CONCEPT";
            document.getElementById('q-txt').innerText = q.q;

            const box = document.getElementById('options-box');
            box.innerHTML = '';
            q.o.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = 'btn-opt'; b.innerText = txt;
                b.onclick = () => validate(i, b);
                box.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            const bar = document.getElementById('timer-bar');
            timer = setInterval(() => {
                timeLeft--;
                bar.style.width = (timeLeft/45*100) + '%';
                if(timeLeft <= 0) { clearInterval(timer); showAns(); }
            }, 1000);
        }

        function validate(idx, btn) {
            if(locked) return;
            const correct = quizSet[currentIdx].c;

            if(idx === correct) {
                locked = true; clearInterval(timer);
                btn.classList.add('is-correct');
                score += (tries === 0) ? 10 : 5;
                document.getElementById('score-display').innerText = "PTS: " + score;
                fx(btn);
                setTimeout(() => { currentIdx++; render(); }, 1200);
            } else {
                tries++;
                btn.classList.add('is-wrong'); btn.disabled = true;
                if(tries === 1) {
                    const fb = document.getElementById('feedback-box');
                    fb.innerText = "Hint: Think about balanced forces or the direction of pull.";
                    fb.classList.remove('hidden');
                } else {
                    locked = true; clearInterval(timer); showAns();
                }
            }
        }

        function showAns() {
            const btns = document.querySelectorAll('.btn-opt');
            btns[quizSet[currentIdx].c].classList.add('is-correct');
            const fb = document.getElementById('feedback-box');
            fb.innerHTML = `<strong>Concept:</strong> ${quizSet[currentIdx].e}`;
            fb.classList.remove('hidden');
            setTimeout(() => { currentIdx++; render(); }, 4000);
        }

        function fx(el) {
            const r = el.getBoundingClientRect();
            for(let i=0; i<8; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle'; s.innerHTML = '★';
                s.style.left = (r.left + Math.random()*r.width) + 'px';
                s.style.top = r.top + 'px';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }
        }

        function end() {
            document.getElementById('scr-quiz').classList.add('hidden');
            document.getElementById('scr-result').classList.remove('hidden');
            document.getElementById('res-score').innerText = score + "/110";
            document.getElementById('res-desc').innerText = score >= 90 ? "Excellent Mastery of Forces!" : "Good effort. Review Resultant Forces for a perfect score.";
        }
    </script>
</body>
</html>
