<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G8 Physics | Master Challenge</title>
    <style>
        :root { --p: #1e293b; --acc: #3b82f6; --s: #10b981; --e: #ef4444; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--p); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        #blueprint {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background-image: linear-gradient(#e2e8f0 1.5px, transparent 1.5px), linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 40px 40px; pointer-events: none;
        }

        #logo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.5s ease;
        }
        #logo-overlay img { width: 220px; }

        .card {
            width: 94%; max-width: 600px; background: rgba(255, 255, 255, 0.98);
            padding: 30px; border-radius: 20px; border: 2px solid #cbd5e1;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            text-align: center; position: relative; z-index: 100;
        }
        .hidden { display: none !important; }

        .header { display: flex; justify-content: space-between; font-weight: 800; color: var(--acc); margin-bottom: 12px; font-size: 0.85rem; letter-spacing: 1px; }
        .timer-track { height: 6px; background: #e2e8f0; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--acc); width: 100%; transition: width 1s linear; }

        .q-text { font-size: 1.1rem; font-weight: 600; text-align: left; line-height: 1.5; margin-bottom: 25px; }
        .grid { display: grid; gap: 10px; }
        .btn-opt {
            padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px;
            background: white; cursor: pointer; transition: 0.2s;
            font-size: 0.95rem; text-align: left; font-weight: 500;
        }
        .btn-opt:hover:not(:disabled) { border-color: var(--acc); background: #f0f9ff; }
        .is-correct { background: var(--s) !important; color: white; border-color: var(--s); }
        .is-wrong { background: var(--e) !important; color: white; border-color: var(--e); }

        .btn-main {
            padding: 18px 45px; background: var(--acc); color: white; border: none;
            border-radius: 50px; font-size: 1.1rem; cursor: pointer; font-weight: 800;
        }

        #feedback { margin-top: 20px; padding: 15px; background: #fffbeb; border-radius: 12px; border-left: 5px solid #f59e0b; text-align: left; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="blueprint"></div>

    <div id="logo-overlay">
        <img src="assets/logo.png" alt="Innovine" onerror="this.style.display='none'">
    </div>

    <div id="scr-intro" class="card hidden">
        <h1 style="color:var(--acc); margin-bottom: 5px;">PHYSICS LAB</h1>
        <p style="color: #64748b; font-weight: 600;">Grade 8 Mastery Set</p>
        <p style="margin: 25px 0; font-size: 0.95rem;">20 Practice Pool | 11 Question Mission</p>
        <button class="btn-main" onclick="startQuiz()">Launch Mission</button>
    </div>

    <div id="scr-quiz" class="card hidden">
        <div class="header">
            <span id="q-num">QUESTION 1/11</span>
            <span id="score-now">SCORE: 0</span>
        </div>
        <div class="timer-track"><div id="timer-bar"></div></div>
        <div id="q-txt" class="q-text"></div>
        <div id="options" class="grid"></div>
        <div id="feedback" class="hidden"></div>
    </div>

    <div id="scr-result" class="card hidden">
        <h2 id="res-title">Mission Report</h2>
        <p id="res-score" style="font-size:3rem; font-weight:900; margin:10px 0; color:var(--acc);"></p>
        <p id="res-desc" style="margin-bottom:25px; color:#64748b;"></p>
        <button class="btn-main" onclick="location.reload()">Retry Mission</button>
    </div>

    <audio id="snd-ok" src="assets/correct.mp3"></audio>
    <audio id="snd-no" src="assets/wrong.mp3"></audio>

    <script>
        // FORCED 3-SECOND TRANSITION
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const overlay = document.getElementById('logo-overlay');
                const intro = document.getElementById('scr-intro');
                
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    intro.classList.remove('hidden');
                }, 500);
            }, 3000); 
        });

        // POOL OF ALL 20 QUESTIONS
        const fullPool = [
            { q: "Two teams are pulling a rope. Team A pulls with 1500 N. Team B pulls with 1550 N. A player on Team B trips and stops pulling, reducing force by 100 N. What happens?", o: ["Moves to B with 50 N", "Remains stationary", "Moves to A with 50 N", "Moves to A with 100 N"], c: 2, e: "New B = 1450N. Resultant = 1500-1450 = 50N toward A." },
            { q: "A football is rolling at constant speed. A player kicks it perpendicular (90°). How does motion change?", o: ["Faster same way", "Stops immediately", "Direction changes, speed same", "Moves backward"], c: 2, e: "Perpendicular force changes direction, not speed magnitude." },
            { q: "An astronaut has a mass of 60 kg on Earth. Moon gravity is 1/6th of Earth. Mass on Moon?", o: ["10 kg", "360 kg", "60 kg", "0 kg"], c: 2, e: "Mass is constant; only weight changes with gravity." },
            { q: "Two identical spring balances are connected in series. A 10 N weight is hung from bottom. Top reading?", o: ["5 N", "10 N", "20 N", "0 N"], c: 1, e: "Tension is transmitted equally through both balances." },
            { q: "A scale rubbed against a sweater attracts paper bits. Demonstrates:", o: ["Magnetic force", "Electrostatic non-contact force", "Muscular transfer", "Friction"], c: 1, e: "Static charge attracts objects without contact." },
            { q: "Student: 'If net force is Zero, the object cannot be moving.' Incorrect because:", o: ["Always move", "Can move at constant speed in straight line", "Zero force speeds it up", "Gravity prevents zero"], c: 1, e: "Zero net force means no acceleration (uniform motion)." },
            { q: "To stop a trolley moving toward you, apply force in which direction?", o: ["90° angle", "Same direction", "Opposite to motion", "Downward"], c: 2, e: "Deceleration requires force opposite to velocity." },
            { q: "Which scenario describes 'Balanced Forces'?", o: ["Car speeding up", "Book lying still on a table", "Ball falling", "Plane taking off"], c: 1, e: "At rest, vertical forces cancel each other out." },
            { q: "Why does a baker apply force to a piece of dough?", o: ["Change motion", "Increase mass", "Change shape and size", "Increase gravity"], c: 2, e: "Force can physically deform non-rigid objects." },
            { q: "Object weighs 120 N on Earth (g=10). Planet X gravity is 5 m/s². Weight on X?", o: ["60 N", "120 N", "24 N", "240 N"], c: 0, e: "Mass = 12kg. Weight = 12 * 5 = 60N." },
            { q: "Brother A pushes Right (50 N), Brother B pushes Left (30 N). Resultant?", o: ["80 N Right", "20 N Left", "20 N Right", "0 N"], c: 2, e: "50R - 30L = 20N Right." },
            { q: "Effect of force demonstrated in squeezing a sponge?", o: ["Motion change", "Direction change", "Shape change", "Speed increase"], c:
