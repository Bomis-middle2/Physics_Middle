<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 8 | Science | Force</title>
    <style>
        :root { --p: #4a90e2; --s: #2ecc71; --e: #e74c3c; --bg: #f8fafc; --txt: #1e293b; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--txt); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* Background Theme */
        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); }

        /* Branding Overlay */
        #logo-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.8s ease;
        }
        #logo-screen img { width: 240px; max-width: 80%; }

        /* Container */
        .card {
            width: 92%; max-width: 500px; background: white; padding: 25px;
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center; position: relative; z-index: 10;
        }
        .hidden { display: none !important; }

        /* UI Elements */
        .stats { display: flex; justify-content: space-between; font-weight: 700; color: var(--p); margin-bottom: 10px; font-size: 0.9rem; }
        .timer-track { height: 6px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--p); width: 100%; transition: width 1s linear; }

        .q-img { width: 100%; max-height: 160px; object-fit: contain; margin-bottom: 15px; border-radius: 10px; background: #f1f5f9; }
        .q-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 20px; line-height: 1.4; color: #334155; }

        .grid { display: grid; gap: 10px; }
        .btn-opt {
            padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px;
            background: white; cursor: pointer; transition: 0.2s; font-size: 1rem; text-align: left;
        }
        .btn-opt:hover:not(:disabled) { border-color: var(--p); background: #f8fafc; }
        .is-correct { background: var(--s) !important; color: white; border-color: var(--s); }
        .is-wrong { background: var(--e) !important; color: white; border-color: var(--e); }

        .btn-go { padding: 16px 40px; background: var(--p); color: white; border: none; border-radius: 50px; font-size: 1.1rem; cursor: pointer; font-weight: 700; margin-top: 10px; transition: transform 0.2s; }
        .btn-go:hover { transform: scale(1.05); }

        #feedback { margin-top: 15px; padding: 12px; background: #fef3c7; border-radius: 10px; border-left: 4px solid #f59e0b; text-align: left; font-size: 0.9rem; }

        /* Animations */
        .sparkle { position: absolute; pointer-events: none; animation: fly 0.7s ease-out forwards; font-size: 20px; color: #facc15; }
        @keyframes fly { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-80px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="canvas-bg"></div>

    <div id="logo-screen">
        <img src="assets/logo.png" alt="Innovine" onerror="this.parentNode.style.display='none'">
    </div>

    <div id="scr-intro" class="card">
        <h1 style="color:var(--p); margin-top:0;">Force</h1>
        <p>Science | Grade 8</p>
        <p style="color:#64748b; margin-bottom:25px;">Test your ability to apply force concepts to real-world scenarios.</p>
        <button class="btn-go" onclick="init()">Start Challenge</button>
    </div>

    <div id="scr-game" class="card hidden">
        <div class="stats">
            <span>Question <span id="q-now">1</span>/10</span>
            <span id="score-now">Score: 0</span>
        </div>
        <div class="timer-track"><div id="timer-bar"></div></div>
        <div id="content">
            <img id="q-image" class="q-img hidden" src="">
            <div id="q-txt" class="q-text"></div>
            <div id="options" class="grid"></div>
        </div>
        <div id="feedback" class="hidden"></div>
    </div>

    <div id="scr-result" class="card hidden">
        <h2 id="res-msg">Quiz Finished</h2>
        <p id="res-score" style="font-size:1.8rem; margin:20px 0; font-weight:800;"></p>
        <p id="res-comment" style="margin-bottom:25px; color:#64748b;"></p>
        <button class="btn-go" onclick="location.reload()">Retry Chapter</button>
    </div>

    <audio id="aud-right" src="assets/correct.mp3"></audio>
    <audio id="aud-wrong" src="assets/wrong.mp3"></audio>
