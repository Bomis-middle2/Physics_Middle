<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G8 Physics | Strict Pool Randomizer</title>
    <style>
        :root { 
            --p: #f8fafc; --text: #1e293b; --acc: #3b82f6; 
            --s: #10b981; --e: #ef4444; --warn: #f59e0b; 
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: var(--p); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        #blueprint {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 1;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: moveGrid 30s linear infinite;
        }

        .card {
            width: 92%; max-width: 600px; background: var(--glass); 
            padding: 2rem; border-radius: 24px; border: 1.5px solid rgba(59, 130, 246, 0.2);
            backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center; position: relative; z-index: 100;
            display: none; opacity: 0; transform: translateY(20px);
            transition: all 0.4s ease;
        }

        #logo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s;
        }

        .btn-opt {
            display: block; width: 100%; padding: 12px 18px; margin: 8px 0;
            background: white; border: 2px solid #e2e8f0;
            border-radius: 12px; color: var(--text); cursor: pointer; text-align: left;
            transition: 0.2s; font-weight: 500; font-size: 0.95rem;
        }
        .btn-opt:hover:not(:disabled) { border-color: var(--acc); background: #f0f9ff; transform: translateX(5px); }
        .is-correct { background: var(--s) !important; color: white; border-color: var(--s); }
        .is-wrong { background: var(--e) !important; color: white; border-color: var(--e); }

        .btn-main {
            padding: 16px 40px; background: var(--acc); color: white; border: none;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 20px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        #timer-track { height: 6px; background: #e2e8f0; margin: 15px 0; border-radius: 10px; overflow: hidden; }
        #timer-bar { height: 100%; background: var(--acc); width: 100%; transition: width 1s linear; }

        #feedback { margin-top: 15px; padding: 12px; background: #fffbeb; border-radius: 10px; border-left: 5px solid var(--warn); text-align: left; font-size: 0.85rem; color: #92400e; }
    </style>
</head>
<body>

    <div id="blueprint"></div>

    <div id="logo-overlay">
        <h2 style="color:#3b82f6; font-family: sans-serif;">LOADING POOL...</h2>
    </div>

    <div id="scr-intro" class="card">
        <h1 style="color:var(--acc); margin-bottom: 5px;">STRICT POOL QUIZ</h1>
        <p style="font-weight: 600; color: #64748b;">Physics Competency randomizer</p>
        <p style="font-size: 0.85rem; color: #94a3b8;">Only your provided questions will appear.</p>
        <button class="btn-main" onclick="startQuiz()">START RANDOMIZER</button>
    </div>

    <div id="scr-quiz" class="card">
        <div style="display:flex; justify-content: space-between; font-size: 0.75rem; color: var(--acc); font-weight: 800;">
            <span id="q-num">QUESTION 1/11</span>
            <span id="score-now">PTS: 0</span>
        </div>
        <div id="timer-track"><div id="timer-bar"></div></div>
        <h3 id="q-txt" style="text-align:left; line-height: 1.4; margin-bottom: 15px;"></h3>
        <div id="options"></div>
        <div id="feedback" style="display:none;"></div>
    </div>

    <div id="scr-result" class="card">
        <h2 style="margin: 0;">SESSION COMPLETE</h2>
        <div id="res-score" style="font-size:3.5rem; font-weight:900; color:var(--acc); margin: 10px 0;"></div>
        <p id="res-rank" style="font-weight: 800; color: var(--warn); margin: 5px 0;"></p>
        <button class="btn-main" onclick="location.reload()">RE-RANDOMIZE</button>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('logo-overlay').style.display = 'none';
            document.getElementById('scr-intro').style.display = 'block';
            setTimeout(() => { document.getElementById('scr-intro').style.opacity = '1'; document.getElementById('scr-intro').style.transform = 'translateY(0)'; }, 50);
        }, 2000);

        // THE ONLY 20 QUESTIONS ALLOWED
        const strictPool = [
            { q: "A crane lifting a beam: Cable pulls up (12,000 N), Gravity pulls down (11,500 N), Air resistance pulls down (100 N). Resultant Force?", o: ["12,000 N Upward", "500 N Upward", "400 N Upward", "600 N Downward"], c: 2, e: "12,000 - (11,500 + 100) = 400 N Upward" },
            { q: "Rope deadlock: Team A pulls 2000 N. Rope moves to Team B with 50 N resultant force after a new player joins. Team B's total force?", o: ["1950 N", "2050 N", "2100 N", "2000 N"], c: 1, e: "2000 + 50 = 2050 N" },
            { q: "Person X pushes North (10 N), Person Y pushes East (10 N). Why move North-East?", o: ["North is stronger", "Forces cancel out", "Resultant acts along the diagonal of non-linear forces", "Force works in straight lines"], c: 2, e: "Diagonal resultant of perpendicular forces." },
            { q: "Car on slope: Gravity down (3000 N), Brakes up (3000 N). Child pushes downhill (10 N). What happens?", o: ["Stays still", "Begins to move downhill", "Moves uphill", "Brakes increase to 3010 N"], c: 1, e: "Unbalanced force (10 N) causes motion." },
            { q: "In which case is the Resultant Force zero?", o: ["Ball falling", "Car turning corner", "Book resting on table", "Rocket taking off"], c: 2, e: "Equilibrium state." },
            { q: "Skydiver opens parachute; air hits the fabric causing an upward jerk. Classify this force:", o: ["Contact Force (Air Resistance)", "Non-contact (Gravity)", "Magnetic", "Electrostatic"], c: 0, e: "Mechanical contact with air." },
            { q: "Student rubs a plastic comb; paper pieces jump to it without touch. This is:", o: ["Muscular", "Magnetic", "Non-contact (Electrostatic)", "Friction"], c: 2, e: "Field force (electrostatic)." },
            { q: "Magnetic crane lifts car before touching it. This proves:", o: ["Magnetic is contact", "Magnetic is Non-contact", "Car is alive", "Gravity stopped"], c: 1, e: "Action at a distance." },
            { q: "Which depends entirely on Muscular Force?", o: ["Magnet pulling needle", "Apple falling", "Weightlifter holding barbell", "Scale attracting hair"], c: 2, e: "Muscle contraction." },
            { q: "Rolling ball stops. Which two forces acted on it?", o: ["Magnetic/Electrostatic", "Gravity (Non-contact) and Friction (Contact)", "Muscular/Magnetic", "Only Gravity"], c: 1, e: "Weight and surface resistance." },
            { q: "Rover mass 120 kg on Earth. Mass on Moon (1/6th gravity)?", o: ["20 kg", "120 kg", "720 kg", "0 kg"], c: 1, e: "Mass never changes with location." },
            { q: "Bag of flour mass 5 kg. Approximate weight on Earth (g=10)?", o: ["5 N", "0.5 N", "50 N", "500 N"], c: 2, e: "5 * 10 = 50 N" },
            { q: "Planet X has double Earth's gravity. Weight 500 N on Earth becomes:", o: ["250 N", "500 N", "1000 N", "100 N"], c: 2, e: "Double gravity = Double weight." },
            { q: "Which instrument gives the same reading on Jupiter as on Earth?", o: ["Spring Balance", "Beam Balance", "Weighing Scale", "All of above"], c: 1, e: "Beam balance compares mass, which is constant." },
            { q: "Falling elevator feels weightless because:", o: ["Gravity vanished", "Mass is zero", "No contact force from floor to oppose gravity", "Too fast"], c: 2, e: "Loss of normal reaction force." },
            { q: "Spring balance measures 10 N. Spring snaps. Pointer shows:", o: ["0 N", "10 N", "Maximum reading", "5 N"], c: 0, e: "No spring tension." },
            { q: "Sponge changes shape under force, brick does not. Why?", o: ["Force only on sponge", "Depends on rigidity", "Brick has no mass", "Solid shape can't change"], c: 1, e: "Rigidity factor." },
            { q: "Batsman hits cricket ball. Ball flies to boundary. Prominent effect?", o: ["Change in mass", "Change in direction of motion", "Change in shape", "Rest to motion"], c: 1, e: "Redirection of velocity." },
            { q: "Toy car (2 m/s) pushed in opposite direction. Result?", o: ["Speed decreases", "Speed increases", "Mass increases", "Non-contact force"], c: 0, e: "Deceleration." },
            { q: "Iron ball vs plastic ball. Why more force to move iron?", o: ["Iron is magnetic", "Inertia/Force depends on mass", "Plastic has no gravity", "Friction only on iron"], c: 1, e: "More mass = more resistance to change." }
        ];

        const finalPool = [
            { q: "FINAL: Balanced tug-of-war. Both pull twice as hard. Result?", o: ["Moves to B", "Resultant Zero, Tension increases", "Resultant doubles", "Rope breaks"], c: 1, e: "Zero net force, higher stress." },
            { q: "FINAL: Floating astronaut (0 N) in 90% gravity. Why?", o: ["No gravity", "Free Fall state", "Vacuum", "Light speed"], c: 1, e: "Scale falls with person." },
            { q: "FINAL: Brick on broad vs narrow side. Friction?", o: ["Narrow higher", "Broad higher", "Same reading", "Area dependent"], c: 2, e: "Area doesn't affect friction." },
            { q: "FINAL: Car at constant 100 km/h in straight line. Resultant?", o: ["100 N", "Equal to engine", "Zero", "Engine-Friction"], c: 2, e: "Zero acceleration." }
        ];

        let session = [], current = 0, score = 0, timer, time = 45, lock = false, tries = 0;

        function startQuiz() {
            let shuffled = [...strictPool].sort(() => 0.5 - Math.random()).slice(0, 10);
            let final = finalPool[Math.floor(Math.random() * finalPool.length)];
            session = [...shuffled, final];
            document.getElementById('scr-intro').style.display = 'none';
            document.getElementById('scr-quiz').style.display = 'block';
            render();
        }

        function render() {
            if(current >= session.length) return end();
            lock = false; tries = 0; time = 45;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('q-num').innerText = `STEP ${current + 1}/11`;
            document.getElementById('q-txt').innerText = session[current].q;
            const box = document.getElementById('options');
            box.innerHTML = '';
            session[current].o.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = 'btn-opt'; b.innerText = txt;
                b.onclick = () => check(i, b);
                box.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            const bar = document.getElementById('timer-bar');
            timer = setInterval(() => {
                time--;
                bar.style.width = (time/45*100) + '%';
                if(time <= 0) { clearInterval(timer); reveal(); }
            }, 1000);
        }

        function check(idx, btn) {
            if(lock) return;
            if(idx === session[current].c) {
                lock = true; clearInterval(timer);
                btn.classList.add('is-correct');
                score += (tries === 0) ? 10 : 5;
                document.getElementById('score-now').innerText = "PTS: " + score;
                setTimeout(() => { current++; render(); }, 1200);
            } else {
                tries++;
                btn.classList.add('is-wrong'); btn.disabled = true;
                document.getElementById('feedback').innerText = "Wrong. Try again.";
                document.getElementById('feedback').style.display = 'block';
                if(tries >= 2) { lock = true; clearInterval(timer); reveal(); }
            }
        }

        function reveal() {
            const btns = document.querySelectorAll('.btn-opt');
            btns[session[current].c].classList.add('is-correct');
            document.getElementById('feedback').innerHTML = `<b>Solution:</b> ${session[current].e}`;
            setTimeout(() => { current++; render(); }, 3000);
        }

        function end() {
            document.getElementById('scr-quiz').style.display = 'none';
            document.getElementById('scr-result').style.display = 'block';
            document.getElementById('res-score').innerText = score + "/110";
            document.getElementById('res-rank').innerText = score >= 100 ? "MASTER" : score >= 60 ? "PRACTITIONER" : "APPRENTICE";
        }
    </script>
</body>
</html>
