<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 8 Physics - Advanced Pressure Interactive</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f7f9;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            margin: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Branding Overlay */
        #brand-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        #brand-layer img { max-width: 220px; }

        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        }

        .game-card {
            width: 95%;
            max-width: 700px;
            background: #fff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        .hidden { display: none !important; }

        .hud {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--primary);
        }

        .timer-container {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-bottom: 20px;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: var(--accent);
            transition: width 1s linear;
        }

        h2 { font-size: 1.2rem; color: var(--primary); margin-bottom: 15px; }

        /* Image Styling */
        .q-image-container {
            width: 100%;
            text-align: center;
            margin-bottom: 15px;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
        }

        .q-image-container img {
            max-height: 180px;
            max-width: 100%;
            border-radius: 4px;
        }

        .options-grid { display: grid; gap: 10px; }

        .opt-btn {
            background: #fff;
            border: 2px solid #e0e6ed;
            padding: 12px 15px;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        .opt-btn.correct { background: var(--success); color: #fff; border-color: var(--success); }
        .opt-btn.wrong { background: var(--danger); color: #fff; border-color: var(--danger); }

        .feedback-text {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            background: #f0f7ff;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }

        /* Star Animation */
        .star-fx {
            position: absolute;
            color: #f1c40f;
            pointer-events: none;
            animation: burst 0.8s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-40px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="brand-layer">
        <img src="assets/logo.png" alt="Innovine Logo">
    </div>

    <div class="bg-layer"></div>

    <div class="game-card">
        <div id="screen-intro">
            <h1>Chapter 2: Pressure</h1>
            <p>Grade 8 | Advanced Competency Interactive</p>
            <button class="action-btn" onclick="initGame()">Start Challenge</button>
        </div>

        <div id="screen-quiz" class="hidden">
            <div class="hud">
                <div>Q: <span id="q-idx">1</span>/10</div>
                <div>Score: <span id="score-val">0</span></div>
            </div>
            <div class="timer-container"><div id="timer-bar"></div></div>

            <div id="image-box" class="q-image-container hidden">
                <img id="q-img" src="" alt="Question Diagram">
            </div>

            <h2 id="q-text"></h2>
            
            <div class="options-grid" id="options-box"></div>
            <div id="feedback-box" class="feedback-text hidden"></div>
            
            <button id="btn-next" class="action-btn hidden" onclick="handleNext()">Next</button>
        </div>

        <div id="screen-result" class="hidden">
            <h2>Challenge Complete!</h2>
            <h1 id="final-score">0/10</h1>
            <p id="result-text"></p>
            <button class="action-btn" onclick="location.reload()">Try Again</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "A fountain pen leaks at a high mountain peak. Why?",
                options: ["Cold air expansion", "Lower outside pressure pushes ink out", "Weaker gravity", "Body heat increase"],
                ans: 1,
                hint: "Inside the pen, air is trapped at sea-level pressure.",
                explain: "At high altitudes, atmospheric pressure is low. The higher pressure inside the pen pushes the ink out."
            },
            {
                q: "Look at the diagram. Which block exerts more pressure on the sponge?",
                img: "assets/q2_1.jpg",
                options: ["Block B (Horizontal)", "Both are equal", "Block A (Vertical)", "The sponge resists both"],
                ans: 2,
                hint: "Pressure = Force / Area. Look at the base size.",
                explain: "Block A has a smaller contact area, concentrating the weight and increasing pressure."
            },
            {
                q: "Based on data, which exerts highest pressure: X(50N, 10cm²) or Z(100N, 25cm²)?",
                options: ["Object X", "Object Z", "Both are equal", "Data insufficient"],
                ans: 0,
                hint: "Divide Force by Area for both.",
                explain: "X = 5 N/cm², Z = 4 N/cm². Object X exerts higher pressure."
            },
            {
                q: "Why would body fluids boil in space without a suit?",
                options: ["High solar heat", "Vacuum lowers boiling point", "Radiation", "Internal body pressure"],
                ans: 1,
                hint: "Liquids boil easier when nothing is pushing down on them.",
                explain: "In a vacuum (zero pressure), the boiling point drops drastically below body temperature."
            },
            {
                q: "Why must a dam wall be designed like this diagram?",
                img: "assets/q5.jpg",
                options: ["Wind protection", "High surface pressure", "Pressure increases with depth", "To slow water flow"],
                ans: 2,
                hint: "Where is the weight of the water column greatest?",
                explain: "Water pressure is much higher at the base, so the wall must be thickest at the bottom."
            },
            {
                q: "Why do tanks use continuous tracks instead of wheels?",
                options: ["Lighter material", "Large area reduces pressure", "Increased friction", "Higher downward force"],
                ans: 1,
                hint: "Tanks are heavy; they need to spread their weight.",
                explain: "The wide tracks distribute the tank's weight over a huge area, allowing it to move on soft mud."
            },
            {
                q: "Narrow Container A and Wide Container B both have 10cm of water. Pressure at bottom is:",
                options: ["Higher in B", "Higher in A", "Same in both", "Dependent on volume"],
                ans: 2,
                hint: "Liquid pressure only cares about height and density.",
                explain: "Pressure at a point in a liquid depends only on depth, not the shape of the container."
            },
            {
                q: "What is the safest way to cross cracking ice as shown?",
                img: "assets/q8.jpg",
                options: ["Run fast", "Stand on one foot", "Lie down and crawl", "Jump to test strength"],
                ans: 2,
                hint: "Maximize your area to minimize your pressure.",
                explain: "By lying flat, you spread your weight over the largest possible area, reducing pressure on the ice."
            },
            {
                q: "Which does NOT use atmospheric pressure?",
                options: ["Drinking straw", "Syringe", "Bouncing ball", "Suction cup"],
                ans: 2,
                hint: "Three rely on air pushing from the outside.",
                explain: "A ball bounces due to elastic force, not a change in air pressure."
            },
            {
                q: "Why does a pressure cooker cook faster at high altitudes?",
                options: ["Higher flame heat", "Trapped pressure raises boiling point", "Chemical catalyst", "Lower internal pressure"],
                ans: 1,
                hint: "Water usually boils at lower temps on mountains. The cooker fixes this.",
                explain: "It traps steam to increase pressure, allowing water to reach much higher temperatures without boiling."
            }
        ];

        let cur = 0, score = 0, timeLeft = 45, timer, attempts = 0;

        window.onload = () => setTimeout(() => document.getElementById('brand-layer').classList.add('hidden'), 5000);

        function initGame() {
            document.getElementById('screen-intro').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            loadQ();
        }

        function loadQ() {
            const d = questions[cur];
            attempts = 0;
            document.getElementById('q-idx').innerText = cur + 1;
            document.getElementById('q-text').innerText = d.q;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('btn-next').classList.add('hidden');
            
            const imgBox = document.getElementById('image-box');
            if(d.img) {
                document.getElementById('q-img').src = d.img;
                imgBox.classList.remove('hidden');
            } else { imgBox.classList.add('hidden'); }

            const box = document.getElementById('options-box');
            box.innerHTML = '';
            d.options.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = o;
                b.onclick = () => check(i, b);
                box.appendChild(b);
            });
            startT();
        }

        function startT() {
            clearInterval(timer);
            timeLeft = 45;
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';
            timer = setInterval(() => {
                timeLeft--;
                bar.style.width = (timeLeft/45*100)+'%';
                if(timeLeft <= 0) { clearInterval(timer); reveal(); }
            }, 1000);
        }

        function check(i, b) {
            const d = questions[cur];
            const f = document.getElementById('feedback-box');
            if(i === d.ans) {
                clearInterval(timer);
                b.classList.add('correct');
                score++;
                document.getElementById('score-val').innerText = score;
                f.innerHTML = `<strong>Correct!</strong> ${d.explain}`;
                f.classList.remove('hidden');
                finish();
            } else {
                attempts++;
                b.classList.add('wrong');
                b.disabled = true;
                if(attempts === 1) {
                    f.innerHTML = `Keep thinking! <strong>Hint:</strong> ${d.hint}`;
                    f.classList.remove('hidden');
                } else { clearInterval(timer); reveal(); }
            }
        }

        function reveal() {
            const d = questions[cur];
            document.querySelectorAll('.opt-btn')[d.ans].classList.add('correct');
            document.getElementById('feedback-box').innerHTML = `Out of tries. ${d.explain}`;
            document.getElementById('feedback-box').classList.remove('hidden');
            finish();
        }

        function finish() {
            document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
            document.getElementById('btn-next').classList.remove('hidden');
        }

        function handleNext() {
            cur++;
            if(cur < questions.length) loadQ();
            else {
                document.getElementById('screen-quiz').classList.add('hidden');
                document.getElementById('screen-result').classList.remove('hidden');
                document.getElementById('final-score').innerText = `${score}/10`;
                document.getElementById('result-text').innerText = score > 7 ? "Mastermind!" : "Keep practicing!";
            }
        }
    </script>
</body>
</html>
