<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 8 Science - Friction Interactive</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #ecf0f1;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            margin: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Logo Branding Layer */
        #brand-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.8s ease;
        }
        #brand-layer img { max-width: 250px; }

        /* Background Visuals */
        .bg-elements {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #d5d8dc 0%, #aab7b8 100%);
        }

        .floating-star {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            animation: float 8s infinite linear;
        }

        @keyframes float {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }

        /* Container */
        .game-card {
            width: 95%;
            max-width: 750px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            position: relative;
            z-index: 10;
        }

        .hidden { display: none !important; }

        /* HUD */
        .hud {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--primary);
        }

        .timer-track {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 1s linear;
        }

        /* Question Content */
        h2 { 
            font-size: 1.15rem; 
            margin-bottom: 20px; 
            line-height: 1.5; 
            color: #2c3e50;
            text-align: left;
        }

        .options-list {
            display: grid;
            gap: 10px;
        }

        .option-item {
            background: #fff;
            border: 2px solid #dcdde1;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            transition: 0.2s;
            font-weight: 500;
        }

        .option-item:hover:not(:disabled) {
            border-color: var(--accent);
            background: #fff8f0;
        }

        .correct { background: var(--success) !important; color: white; border-color: #219150; }
        .wrong { background: var(--danger) !important; color: white; border-color: #c0392b; }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.5;
            background: #f8f9fa;
            border-left: 5px solid var(--primary);
        }

        .btn-next {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            cursor: pointer;
            float: right;
            margin-top: 20px;
            font-weight: bold;
        }

        .text-center { text-align: center; }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 12px; height: 12px;
            background: gold;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="brand-layer">
        <img src="assets/logo.png" alt="Innovine Logo">
    </div>

    <div class="bg-elements" id="stars"></div>

    <div class="game-card">
        <div id="screen-start" class="text-center">
            <h1 style="color:var(--primary)">Chapter 3: Friction</h1>
            <p style="color: #7f8c8d;">Grade 8 Science | Case-Based Interactive</p>
            <p>Explore why friction is considered a 'necessary evil' through real-life scientific scenarios.</p>
            <button class="btn-next" style="float:none" onclick="startQuiz()">Begin Mission</button>
        </div>

        <div id="screen-quiz" class="hidden">
            <div class="hud">
                <span>TASK: <span id="q-count">1</span>/10</span>
                <span>PTS: <span id="score">0</span></span>
            </div>
            <div class="timer-track"><div id="timer-bar"></div></div>

            <h2 id="q-text"></h2>
            
            <div class="options-list" id="options-box"></div>
            <div id="feedback-box" class="feedback hidden"></div>
            
            <button id="btn-continue" class="btn-next hidden" onclick="nextQuestion()">Next Task</button>
        </div>

        <div id="screen-result" class="hidden text-center">
            <h2 style="font-size: 2rem;">Mission Complete!</h2>
            <h1 id="final-score" style="font-size: 4rem; color: var(--accent);">0/10</h1>
            <p id="result-msg"></p>
            <button class="btn-next" style="float:none" onclick="location.reload()">Restart Quiz</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "CASE STUDY: A professional mountaineer wears boots fitted with sharp metal spikes called crampons while climbing a steep ice glacier. What is the primary scientific reason for this equipment?",
                options: ["To make the boots lightweight.", "To increase friction by creating more grip on the ice.", "To help the ice melt and become sticky.", "To reduce the surface area contact."],
                ans: 1,
                hint: "Spikes penetrate the smooth ice. Does this increase or decrease surface irregularities?",
                explain: "Correct! Crampons increase the irregularities that interlock with the ice, providing the friction needed to prevent a dangerous slip."
            },
            {
                q: "CASE STUDY: A carpenter notices a wooden door hinge is squeaking loudly and is difficult to move. He pours a few drops of machine oil into the joint. How does the oil solve the problem?",
                options: ["The oil hardens the hinge.", "It creates a thin layer that reduces friction between metal parts.", "It increases the weight of the door to keep it steady.", "Oil increases friction to stop the noise."],
                ans: 1,
                hint: "Oil is a lubricant. Lubricants fill in the microscopic hills and valleys of a surface.",
                explain: "Exactly! Lubricants form a thin film that prevents surfaces from rubbing directly against each other, allowing them to glide smoothly."
            },
            {
                q: "CASE STUDY: A student finds it much easier to pull a heavy travel bag when it has wheels than when it doesn't. Which physics principle explains this difference?",
                options: ["Wheels reduce the total mass of the bag.", "Rolling friction is significantly less than sliding friction.", "The wheels increase the gravitational pull.", "Air resistance is lower with wheels."],
                ans: 1,
                hint: "Think about the effort needed to slide a heavy box versus rolling a log.",
                explain: "Correct! Rolling friction is always much smaller than sliding friction, which is why wheels are a fundamental invention for transportation."
            },
            {
                q: "CASE STUDY: High-speed trains and luxury sports cars are designed with a narrow, pointed 'streamlined' shape. Why is this specific design necessary for high-speed travel?",
                options: ["To make the vehicle look attractive.", "To reduce fluid friction (air drag) at high speeds.", "To increase the downward weight of the vehicle.", "To help the vehicle stop faster."],
                ans: 1,
                hint: "Air exerts a resistive force on anything moving through it, known as drag.",
                explain: "Correct! A streamlined shape allows air to flow smoothly around the object, minimizing the resistive force of fluid friction."
            },
            {
                q: "CASE STUDY: When a matchstick is struck against the rough side of a matchbox, it immediately ignites. Which conversion of energy is happening here due to friction?",
                options: ["Chemical energy into light only.", "Mechanical energy into heat energy through friction.", "Heat energy into magnetic energy.", "Friction removes oxygen to start the fire."],
                ans: 1,
                hint: "Rubbing surfaces together generates something you can feel with your palms.",
                explain: "Correct! Friction between the rough surfaces converts the motion (mechanical energy) into heat, which is enough to ignite the phosphorus."
            },
            {
                q: "CASE STUDY: In a school experiment, a toy car is tested on different surfaces. Which of these surfaces will allow the car to travel the FARTHEST distance after a single push?",
                options: ["A dry concrete pavement.", "A sheet of rough sandpaper.", "A marble floor covered in soapy water.", "A thick, plush woolen carpet."],
                ans: 2,
                hint: "The car will travel farthest where the opposing force of friction is the lowest.",
                explain: "Exactly! Soapy water acts as a lubricant, filling surface irregularities and creating a very smooth interface with minimal friction."
            },
            {
                q: "CASE STUDY: Mechanics observe that the brake pads of a motorcycle become thin and smooth after months of use. What does this demonstrate about the nature of friction?",
                options: ["Friction helps build up the material.", "Friction causes wear and tear of surfaces in contact.", "Friction only happens when surfaces are new.", "Brake pads become more effective as they get thinner."],
                ans: 1,
                hint: "Think about how your pencil gets shorter the more you write with it.",
                explain: "Correct! One major disadvantage of friction is that it causes the surfaces of moving parts to wear out over time."
            },
            {
                q: "CASE STUDY: Before a performance on the parallel bars, a gymnast applies a white, chalky powder (Magnesium Carbonate) to her palms. What is the goal of this action?",
                options: ["To make her hands slide easily across the bar.", "To increase friction for a secure and stable grip.", "To reduce the heat produced by her hands.", "To make her hands look uniform."],
                ans: 1,
                hint: "Sweat acts as a lubricant, making hands slippery. How does powder help?",
                explain: "Correct! The powder absorbs moisture and increases surface roughness, ensuring the gymnast doesn't lose her grip due to low friction."
            },
            {
                q: "CASE STUDY: A student argues that friction is only a nuisance because it causes heat and wear. Which of these examples proves that friction is actually a 'Necessary Evil'?",
                options: ["Overheating of car engines.", "The ability to write with a pen on paper.", "The rusting of iron parts.", "The noise made by a machine."],
                ans: 1,
                hint: "Imagine trying to write on a glass sheet coated with oil.",
                explain: "Correct! Without friction, the tip of the pen would slide uncontrollably, and no ink would be deposited on the paper."
            },
            {
                q: "CASE STUDY: To keep a heavy box moving across a floor at a constant speed, you must provide a continuous push. If you stop pushing, the box stops. Why?",
                options: ["Gravity pulls the box downward.", "Friction acts in the opposite direction of motion.", "The box runs out of internal energy.", "The air pressure stops the box."],
                ans: 1,
                hint: "Friction is an opposing force that is always present between two sliding surfaces.",
                explain: "Correct! Friction continuously opposes the motion; therefore, an external force is required to balance it and maintain speed."
            }
        ];

        let curIdx = 0, score = 0, timer, timeLeft = 45, attempts = 0;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('brand-layer').style.opacity = '0';
                setTimeout(() => document.getElementById('brand-layer').classList.add('hidden'), 800);
            }, 3000); // Reduced delay for better UX
            genStars();
        };

        function genStars() {
            const container = document.getElementById('stars');
            for(let i=0; i<15; i++) {
                const s = document.createElement('div');
                s.className = 'floating-star';
                s.innerText = '★';
                s.style.left = Math.random() * 100 + '%';
                s.style.animationDelay = Math.random() * 8 + 's';
                container.appendChild(s);
            }
        }

        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const data = questions[curIdx];
            attempts = 0;
            document.getElementById('q-count').innerText = curIdx + 1;
            document.getElementById('q-text').innerText = data.q;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('btn-continue').classList.add('hidden');
            
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            data.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-item';
                btn.innerText = opt;
                btn.onclick = () => checkAns(i, btn);
                box.appendChild(btn);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timeLeft = 45;
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';
            timer = setInterval(() => {
                timeLeft--;
                bar.style.width = (timeLeft/45 * 100) + '%';
                if(timeLeft <= 0) { clearInterval(timer); revealCorrect(); }
            }, 1000);
        }

        function checkAns(idx, btn) {
            const data = questions[curIdx];
            const feedback = document.getElementById('feedback-box');
            
            if(idx === data.ans) {
                clearInterval(timer);
                btn.classList.add('correct');
                score++;
                document.getElementById('score').innerText = score;
                feedback.innerHTML = `<b style="color:var(--success)">Excellent Observation!</b><br>${data.explain}`;
                feedback.classList.remove('hidden');
                triggerConfetti();
                disableOptions();
                document.getElementById('btn-continue').classList.remove('hidden');
            } else {
                attempts++;
                btn.classList.add('wrong');
                btn.disabled = true;
                if(attempts === 1) {
                    feedback.innerHTML = `<b style="color:var(--danger)">Analysis Incomplete.</b><br>Hint: ${data.hint}`;
                    feedback.classList.remove('hidden');
                } else {
                    clearInterval(timer);
                    revealCorrect();
                }
            }
        }

        function revealCorrect() {
            const data = questions[curIdx];
            const btns = document.querySelectorAll('.option-item');
            btns[data.ans].classList.add('correct');
            document.getElementById('feedback-box').innerHTML = `<b style="color:var(--primary)">Scientific Conclusion:</b><br>${data.explain}`;
            document.getElementById('feedback-box').classList.remove('hidden');
            disableOptions();
            document.getElementById('btn-continue').classList.remove('hidden');
        }

        function disableOptions() {
            document.querySelectorAll('.option-item').forEach(b => b.disabled = true);
        }

        function triggerConfetti() {
            for(let i=0; i<12; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = (Math.random() * 80 + 10) + '%';
                c.style.top = (Math.random() * 50 + 20) + '%';
                c.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
                document.querySelector('.game-card').appendChild(c);
                setTimeout(() => c.remove(), 1000);
            }
        }

        function nextQuestion() {
            curIdx++;
            if(curIdx < questions.length) loadQuestion();
            else showResult();
        }

        function showResult() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score}/10`;
            let msg = "";
            if(score === 10) msg = "Scientific Master! You perfectly understand the dynamics of friction.";
            else if(score > 7) msg = "Great job! You have a solid grasp of how forces interact in real life.";
            else msg = "Good effort! Try reviewing the differences between rolling, sliding, and fluid friction.";
            document.getElementById('result-msg').innerText = msg;
        }
    </script>
</body>
</html>
